<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>GAYA</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600&family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#f1ebdc; --paper:#fbf6e9; --paper-2:#ede3cc; --ink:#2a221a; --ink-soft:#5c4f3f;
  --ink-faint:#9d8e77; --moss:#4a5d3a; --moss-deep:#2c3a22; --gold:#a8854f;
  --claret:#6b2c3a; --fog:#d8ccb2; --fog-deep:#b9aa8a;
  --shadow:0 1px 3px rgba(43,35,27,.08), 0 8px 28px rgba(43,35,27,.07);
  --serif-d:'Cormorant Garamond', Georgia, serif; --serif-b:'EB Garamond', Georgia, serif;
  --mono:ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
}
*{box-sizing:border-box} html,body{margin:0;min-height:100%;font-family:var(--serif-b);font-size:18px;line-height:1.65;color:var(--ink);background:var(--bg)}
body{background-image:radial-gradient(at 12% 8%,rgba(74,93,58,.06),transparent 55%),radial-gradient(at 88% 90%,rgba(107,44,58,.05),transparent 55%)}
h1,h2,h3{font-family:var(--serif-d);font-weight:500;line-height:1.15;margin:0;color:var(--ink)} h1{font-size:2.6rem;font-style:italic} h2{font-size:1.8rem;font-style:italic} h3{font-size:1.35rem}
a{color:var(--moss);text-decoration:none;border-bottom:1px solid transparent} a:hover{border-bottom-color:var(--gold)}
button{font-family:var(--serif-b);font-size:1rem;background:var(--moss-deep);color:var(--paper);border:0;padding:.62rem 1.25rem;border-radius:2px;cursor:pointer;letter-spacing:.03em} button:hover{background:var(--moss)} button:disabled{opacity:.6;cursor:wait}
button.ghost{background:transparent;color:var(--ink-soft);border:1px solid var(--fog-deep)} button.ghost:hover{background:var(--paper-2);color:var(--ink)} button.danger{background:var(--claret)}
input,textarea,select{width:100%;font:inherit;background:var(--paper);border:1px solid var(--fog-deep);border-radius:2px;color:var(--ink);padding:.65rem .85rem} textarea{resize:vertical;min-height:140px} label{display:block;margin:0 0 .35rem;color:var(--ink-soft);font-size:.78rem;text-transform:uppercase;letter-spacing:.12em}
.app{min-height:100vh;display:flex;flex-direction:column}.topbar{position:sticky;top:0;z-index:10;background:var(--paper);border-bottom:1px solid var(--fog);display:flex;align-items:center;justify-content:space-between;gap:1rem;padding:1rem 2rem}.brand{font-family:var(--serif-d);font-size:1.7rem;font-weight:600;letter-spacing:.25em;color:var(--moss-deep);cursor:pointer}.brand .leaf{color:var(--gold);letter-spacing:0}.nav-tabs{display:flex;gap:1.5rem}.nav-tabs a{font-family:var(--serif-d);font-size:1.2rem;font-style:italic;color:var(--ink-soft)}.nav-tabs a.active{color:var(--moss-deep);border-bottom-color:var(--gold)}.user-strip{display:flex;align-items:center;gap:.75rem;color:var(--ink-soft);font-style:italic;font-size:.9rem}.main{width:100%;max-width:920px;margin:0 auto;padding:3rem 2rem 5rem}.page-header{display:flex;justify-content:space-between;align-items:baseline;gap:1rem;margin-bottom:1.5rem}.muted{color:var(--ink-faint);font-style:italic}.center{text-align:center}.row{display:flex;align-items:center;gap:.75rem;flex-wrap:wrap}.spread{display:flex;justify-content:space-between;align-items:center;gap:1rem;flex-wrap:wrap}.mt{margin-top:1rem}.mt2{margin-top:2rem}.divider{display:flex;align-items:center;justify-content:center;color:var(--gold);letter-spacing:.35em;margin:2.25rem 0}.divider:before,.divider:after{content:"";height:1px;background:var(--fog-deep);flex:1;margin:0 1rem}
.login-screen{min-height:100vh;display:grid;place-items:center;padding:1rem}.login-card{width:min(460px,92vw);background:var(--paper);border:1px solid var(--fog-deep);box-shadow:var(--shadow);padding:3rem 2.5rem;text-align:center;position:relative}.login-card:before,.login-card:after{content:"";position:absolute;width:38px;height:38px;border:1px solid var(--gold)}.login-card:before{top:8px;left:8px;border-right:0;border-bottom:0}.login-card:after{right:8px;bottom:8px;border-left:0;border-top:0}.login-card .brand{font-size:2.5rem;cursor:default}.login-tag{font-family:var(--serif-d);font-style:italic;color:var(--ink-soft);margin:0 0 2rem}.login-msg{min-height:1.4rem;margin-top:.9rem;color:var(--moss);font-style:italic}.login-msg.err{color:var(--claret)}
.thread-list{display:flex;flex-direction:column;gap:1rem}.thread-card{background:var(--paper);border:1px solid var(--fog-deep);padding:1.5rem 1.75rem;cursor:pointer}.thread-card:hover{border-color:var(--moss);box-shadow:var(--shadow)}.summary{color:var(--ink-soft);font-style:italic}.meta{margin-top:.8rem;color:var(--ink-faint);font-size:.78rem;text-transform:uppercase;letter-spacing:.08em}.thread-summary{background:var(--paper);border-left:2px solid var(--gold);padding:1rem 1.25rem;margin:1rem 0 2rem;color:var(--ink-soft);font-style:italic}.back-link{display:inline-block;margin-bottom:1rem;font-family:var(--serif-d);font-style:italic}
.post-skin{margin:2rem 0;padding:2rem 2.2rem;background:var(--paper);border:1px solid var(--fog-deep);color:var(--ink);--accent:var(--gold);font-family:var(--serif-b)}.post-header{display:flex;align-items:center;gap:1rem;border-bottom:1px solid currentColor;padding-bottom:.8rem;margin-bottom:1.2rem;opacity:.9}.post-avatar{width:52px;height:52px;border-radius:50%;background:var(--accent);background-size:cover;background-position:center;border:1px solid currentColor;flex:0 0 auto}.post-name{font-family:var(--serif-d);font-size:1.4rem;font-weight:600}.post-meta{margin-left:auto;font-size:.72rem;text-transform:uppercase;letter-spacing:.12em;opacity:.55}.post-body p{margin:0 0 1rem}.post-body blockquote{border-left:3px solid currentColor;margin:1rem 0;padding:.2rem 0 .2rem 1rem;font-style:italic}.post-signature{border-top:1px solid currentColor;margin-top:1.4rem;padding-top:.8rem;font-style:italic;opacity:.78}.composer,.persona-editor,.error-card{background:var(--paper);border:1px solid var(--fog-deep);padding:2rem}.composer{border-style:dashed;margin-top:3rem}.persona-page{display:grid;grid-template-columns:280px 1fr;gap:2rem}.persona-list{display:flex;flex-direction:column;gap:.4rem}.persona-list-item{background:var(--paper);border:1px solid var(--fog-deep);padding:.65rem .9rem;cursor:pointer;font-family:var(--serif-d);font-size:1.15rem}.persona-list-item.active{background:var(--paper-2);border-color:var(--gold)}.dot{display:inline-block;width:14px;height:14px;border-radius:50%;border:1px solid var(--fog-deep);margin-right:.5rem;vertical-align:-1px}.editor-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem}.field.full{grid-column:1/-1}.color-row{display:flex;gap:.5rem}.color-row input[type=color]{width:52px;height:42px;padding:2px;flex:0 0 auto}.modal-bg{position:fixed;inset:0;background:rgba(43,35,27,.55);display:grid;place-items:center;z-index:30;padding:1rem}.modal{background:var(--paper);border:1px solid var(--fog-deep);box-shadow:var(--shadow);width:min(620px,94vw);padding:2rem;position:relative}.modal-close{position:absolute;right:1rem;top:.8rem;background:transparent;color:var(--ink-faint);font-size:1.5rem;padding:.1rem .5rem}.toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%);z-index:40;background:var(--moss-deep);color:var(--paper);padding:.8rem 1.3rem;box-shadow:var(--shadow);font-style:italic}.toast.err{background:var(--claret)}.error-card pre{white-space:pre-wrap;background:var(--paper-2);padding:1rem;overflow:auto;font-family:var(--mono);font-size:.82rem}
@media(max-width:760px){.topbar{align-items:flex-start;flex-direction:column;padding:1rem}.nav-tabs{gap:1rem}.main{padding:2rem 1rem 4rem}.page-header{align-items:flex-start;flex-direction:column}.persona-page,.editor-grid{grid-template-columns:1fr}.user-strip{width:100%;justify-content:space-between}}
</style>
</head>
<body>
<div id="app"></div>
<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2.45.4';
import { marked } from 'https://esm.sh/marked@12.0.2';
import DOMPurify from 'https://esm.sh/dompurify@3.1.6';

const SUPABASE_URL = 'https://yunwwocryohmvnfwbjig.supabase.co';
const SUPABASE_KEY = 'sb_publishable_XmVMsFZWZ_ZkMQVQyRnAmQ_FqllXED3';
const supa = createClient(SUPABASE_URL, SUPABASE_KEY);
marked.setOptions({ breaks:true, gfm:true });

const app = document.getElementById('app');
const state = { session:null, user:null, view:'threads', currentThreadId:null, threads:[], posts:[], allPersonas:[], myPersonas:[], selectedPersonaId:null, modal:null, error:null };
const esc = s => String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const md = s => DOMPurify.sanitize(marked.parse(String(s || '')), { ADD_ATTR:['target','rel'] });
const byId = id => document.getElementById(id);
function fmtDate(iso){ if(!iso) return 'undated'; const d = new Date(iso); return Number.isNaN(d.getTime()) ? 'undated' : d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}); }
function toast(msg, kind='ok'){ const t=document.createElement('div'); t.className='toast'+(kind==='err'?' err':''); t.textContent=msg; document.body.appendChild(t); setTimeout(()=>t.remove(),3200); }
function showError(err, where='app'){ console.error(where, err); state.error = { where, message: err?.message || String(err), stack: err?.stack || '' }; renderError(); }
window.addEventListener('error', e => showError(e.error || e.message, 'runtime error'));
window.addEventListener('unhandledrejection', e => showError(e.reason, 'unhandled promise'));

function renderError(){
  app.innerHTML = `<div class="main"><div class="error-card"><h1>GAYA tripped on a root.</h1><p class="muted">The app caught the error instead of going blank.</p><pre>${esc(state.error?.where)}\n${esc(state.error?.message)}\n${esc(state.error?.stack)}</pre><div class="row"><button id="retry">try again</button><a href="#threads">back to threads</a></div></div></div>`;
  byId('retry').addEventListener('click', () => { state.error=null; boot(); });
}
async function safe(fn, where){ try { return await fn(); } catch(err) { showError(err, where); return null; } }

async function checkSession(){ const { data, error } = await supa.auth.getSession(); if(error) throw error; state.session=data.session; state.user=data.session?.user || null; }
async function sendMagicLink(email){ const redirectTo = window.location.origin + window.location.pathname; const { error } = await supa.auth.signInWithOtp({ email, options:{ emailRedirectTo:redirectTo, shouldCreateUser:false } }); return error; }
async function signOut(){ await supa.auth.signOut(); Object.assign(state,{session:null,user:null,threads:[],posts:[],allPersonas:[],myPersonas:[],currentThreadId:null,view:'threads'}); render(); }

async function loadThreads(){ const { data, error } = await supa.from('threads').select('*').order('updated_at',{ascending:false}); if(error) throw error; state.threads=data || []; }
async function loadPersonas(){ const { data, error } = await supa.from('personas').select('*').order('created_at',{ascending:true}); if(error) throw error; state.allPersonas=data || []; state.myPersonas=state.allPersonas.filter(p => p.user_id === state.user?.id); applyAllPersonaCss(); }
async function loadThreadPosts(threadId){ const { data, error } = await supa.from('posts').select('*, persona:personas(*)').eq('thread_id', threadId).order('created_at',{ascending:true}); if(error) throw error; state.posts=data || []; }
async function loadAll(){ await Promise.all([loadThreads(), loadPersonas()]); }
async function createThread({title, summary}){ const { data, error } = await supa.from('threads').insert({ title, summary: summary || null, created_by: state.user.id }).select('*').single(); if(error) throw error; await loadThreads(); return data; }
async function createPost({thread_id, persona_id, body}){ const { data, error } = await supa.from('posts').insert({ thread_id, persona_id, author_id: state.user.id, body }).select('*, persona:personas(*)').single(); if(error) throw error; state.posts.push(data); await supa.from('threads').update({ updated_at:new Date().toISOString() }).eq('id', thread_id); await loadThreads(); return data; }
async function deletePost(id){ const { error } = await supa.from('posts').delete().eq('id', id); if(error) throw error; state.posts=state.posts.filter(p => p.id !== id); }
async function savePersona(persona){ const payload = { name:persona.name, avatar_url:persona.avatar_url||null, banner_url:persona.banner_url||null, signature:persona.signature||null, bg_color:persona.bg_color, text_color:persona.text_color, accent_color:persona.accent_color, border_color:persona.border_color, font_family:persona.font_family, custom_css:persona.custom_css||null, updated_at:new Date().toISOString() }; let res; if(persona.id){ res = await supa.from('personas').update(payload).eq('id', persona.id).select().single(); } else { payload.user_id = state.user.id; res = await supa.from('personas').insert(payload).select().single(); } if(res.error) throw res.error; await loadPersonas(); return res.data; }
async function deletePersona(id){ const { error } = await supa.from('personas').delete().eq('id', id); if(error) throw error; await loadPersonas(); }

function readHash(){ const h=(location.hash || '#threads').slice(1); if(h.startsWith('thread/')){ state.view='thread'; state.currentThreadId=h.slice(7); } else if(h==='personas'){ state.view='personas'; state.currentThreadId=null; } else { state.view='threads'; state.currentThreadId=null; } }
async function go(hash){ if(location.hash === '#' + hash){ readHash(); if(state.view==='thread') await safe(() => loadThreadPosts(state.currentThreadId),'load thread posts'); render(); } else location.hash = hash; }
window.addEventListener('hashchange', () => safe(async () => { readHash(); if(state.view==='thread' && state.currentThreadId) await loadThreadPosts(state.currentThreadId); render(); }, 'hash navigation'));
supa.auth.onAuthStateChange((event, session) => safe(async () => { state.session=session; state.user=session?.user || null; if(session) await loadAll(); render(); }, 'auth change'));

function applyAllPersonaCss(){ document.querySelectorAll('style[data-persona-css]').forEach(el => el.remove()); for(const p of state.allPersonas){ const css=String(p.custom_css||'').trim(); if(!css) continue; const el=document.createElement('style'); el.dataset.personaCss=p.id; el.textContent = `.post-skin[data-persona-id="${CSS.escape(String(p.id))}"]{${css}}`; document.head.appendChild(el); } }
function personaStyle(p){ const parts=[]; if(p.bg_color)parts.push(`background:${p.bg_color}`); if(p.text_color)parts.push(`color:${p.text_color}`); if(p.border_color)parts.push(`border-color:${p.border_color}`); if(p.accent_color)parts.push(`--accent:${p.accent_color}`); if(p.font_family)parts.push(`font-family:${p.font_family}`); return parts.join(';'); }
function avatarStyle(p){ return `background-color:${p.accent_color || '#a8854f'}${p.avatar_url ? `;background-image:url('${esc(p.avatar_url)}')` : ''}`; }

function render(){ if(state.error) return renderError(); if(!state.session) return renderLogin(); return renderApp(); }
function renderLogin(){ app.innerHTML = `<div class="login-screen"><div class="login-card"><div class="brand"><span class="leaf">❦</span> GAYA <span class="leaf">❦</span></div><p class="login-tag">a little garden, for the two of us</p><form id="login-form"><label for="email">email</label><input id="email" type="email" required autocomplete="email" placeholder="you@somewhere.com"><button class="mt" type="submit">send the link</button><div class="login-msg" id="login-msg"></div></form></div></div>`; byId('login-form').addEventListener('submit', e => safe(async () => { e.preventDefault(); const msg=byId('login-msg'); msg.className='login-msg'; msg.textContent='sending…'; const err=await sendMagicLink(byId('email').value.trim()); if(err){ msg.className='login-msg err'; msg.textContent=err.message || 'something went wrong.'; } else msg.textContent='check your inbox. the link will sign you in.'; }, 'send magic link')); }
function renderApp(){ const view=state.view; app.innerHTML = `<div class="app"><div class="topbar"><div class="brand" id="brand"><span class="leaf">❦</span> GAYA</div><nav class="nav-tabs"><a href="#threads" class="${view==='threads'||view==='thread'?'active':''}">threads</a><a href="#personas" class="${view==='personas'?'active':''}">personas</a></nav><div class="user-strip"><span>${esc(state.user?.email || '')}</span><button class="ghost" id="signout">sign out</button></div></div><main class="main" id="main"></main></div>`; byId('brand').addEventListener('click',()=>go('threads')); byId('signout').addEventListener('click',()=>safe(signOut,'sign out')); if(view==='thread') renderThreadView(); else if(view==='personas') renderPersonasView(); else renderThreadsView(); if(state.modal==='new-thread') renderNewThreadModal(); }
function renderThreadsView(){ const main=byId('main'); main.innerHTML = `<div class="page-header"><h1>Threads</h1><button id="new-thread-btn">＋ new thread</button></div>${state.threads.length ? `<div class="thread-list">${state.threads.map(t => `<article class="thread-card" data-id="${esc(t.id)}"><h3>${esc(t.title)}</h3>${t.summary ? `<div class="summary">${esc(t.summary).slice(0,220)}${String(t.summary).length>220?'…':''}</div>`:''}<div class="meta">last activity · ${fmtDate(t.updated_at || t.created_at)}</div></article>`).join('')}</div>` : `<div class="center"><h2>nothing planted yet</h2><p class="muted">start the first thread above</p></div>`}`; byId('new-thread-btn').addEventListener('click',()=>{state.modal='new-thread'; render();}); document.querySelectorAll('.thread-card').forEach(el => el.addEventListener('click',()=>go(`thread/${el.dataset.id}`))); }
function renderThreadView(){ const main=byId('main'); const t=state.threads.find(x => String(x.id) === String(state.currentThreadId)); if(!t){ main.innerHTML = `<a class="back-link" href="#threads">← back to threads</a><div class="error-card"><h2>thread not found</h2><p class="muted">Reloaded the thread list, but this id is not visible to the current user.</p></div>`; return; } main.innerHTML = `<a class="back-link" href="#threads">← back to threads</a><div class="thread-header"><h1>${esc(t.title)}</h1></div>${t.summary ? `<div class="thread-summary">${md(t.summary)}</div>`:''}<div class="divider">❦</div><div id="posts-list"></div><div id="composer-wrap"></div>`; renderPosts(); renderComposer(); }
function renderPosts(){ const list=byId('posts-list'); if(!state.posts.length){ list.innerHTML='<p class="muted center">no posts yet — be the first to write</p>'; return; } list.innerHTML=state.posts.map(p => { const persona=p.persona; const mine=p.author_id === state.user?.id; if(!persona) return `<article class="post-skin"><div class="post-header"><div class="post-name">unknown persona</div><div class="post-meta">${fmtDate(p.created_at)}</div></div><div class="post-body">${md(p.body)}</div>${mine?`<button class="ghost post-delete" data-id="${esc(p.id)}">delete</button>`:''}</article>`; const banner=persona.banner_url ? `<div style="background-image:url('${esc(persona.banner_url)}');background-size:cover;background-position:center;height:120px;margin:-2rem -2.2rem 1.5rem"></div>` : ''; return `<article class="post-skin" data-persona-id="${esc(persona.id)}" style="${personaStyle(persona)}">${banner}<div class="post-header"><div class="post-avatar" style="${avatarStyle(persona)}"></div><div class="post-name">${esc(persona.name)}</div><div class="post-meta">${fmtDate(p.created_at)}</div></div><div class="post-body">${md(p.body)}</div>${persona.signature ? `<div class="post-signature">${md(persona.signature)}</div>`:''}${mine?`<button class="ghost post-delete" data-id="${esc(p.id)}">delete</button>`:''}</article>`; }).join(''); document.querySelectorAll('.post-delete').forEach(btn => btn.addEventListener('click',()=>safe(async()=>{ if(!confirm('Delete this post?')) return; await deletePost(btn.dataset.id); renderPosts(); toast('deleted'); },'delete post'))); }
function renderComposer(){ const wrap=byId('composer-wrap'); if(!state.myPersonas.length){ wrap.innerHTML = `<div class="composer"><h3>to reply, first make a persona</h3><p class="muted">go to <a href="#personas">personas</a> and make one — it tells the post what to wear.</p></div>`; return; } if(!state.myPersonas.some(p => p.id === state.selectedPersonaId)) state.selectedPersonaId=state.myPersonas[0].id; wrap.innerHTML = `<div class="composer"><h3>reply</h3><div class="row"><label style="margin:0">as</label><select id="persona-select">${state.myPersonas.map(p => `<option value="${esc(p.id)}" ${p.id===state.selectedPersonaId?'selected':''}>${esc(p.name)}</option>`).join('')}</select></div><textarea id="composer-body" class="mt" placeholder="markdown welcome"></textarea><div class="spread mt"><p class="muted">markdown renders inside your persona's skin</p><button id="post-btn">post</button></div></div>`; byId('persona-select').addEventListener('change', e => state.selectedPersonaId=e.target.value); byId('post-btn').addEventListener('click',()=>safe(async()=>{ const body=byId('composer-body').value.trim(); if(!body) return toast('write something first','err'); const btn=byId('post-btn'); btn.disabled=true; btn.textContent='posting…'; await createPost({thread_id:state.currentThreadId, persona_id:state.selectedPersonaId, body}); byId('composer-body').value=''; btn.disabled=false; btn.textContent='post'; renderPosts(); toast('posted'); },'create post')); }
function renderPersonasView(){ const main=byId('main'); main.innerHTML = `<div class="page-header"><h1>Personas</h1><button id="new-persona-btn">＋ new persona</button></div><div class="persona-page"><aside><h3>yours</h3><div class="persona-list" id="persona-list"></div></aside><section id="persona-edit-area"></section></div>`; byId('new-persona-btn').addEventListener('click',()=>openPersonaEditor(null)); renderPersonaList(); openPersonaEditor(state.myPersonas[0] || null); }
function renderPersonaList(){ const list=byId('persona-list'); list.innerHTML = state.myPersonas.length ? state.myPersonas.map(p => `<div class="persona-list-item" data-id="${esc(p.id)}"><span class="dot" style="background:${p.accent_color || '#a8854f'}"></span>${esc(p.name)}</div>`).join('') : `<p class="muted">none yet</p>`; list.querySelectorAll('.persona-list-item').forEach(el => el.addEventListener('click',()=>openPersonaEditor(state.myPersonas.find(p => String(p.id)===String(el.dataset.id))))); }
function openPersonaEditor(persona){ const area=byId('persona-edit-area'); if(!area) return; document.querySelectorAll('.persona-list-item').forEach(el => el.classList.toggle('active', persona && String(el.dataset.id)===String(persona.id))); const d=persona ? {...persona} : { id:null, name:'new persona', avatar_url:'', banner_url:'', signature:'', bg_color:'#fbf6e9', text_color:'#2a221a', accent_color:'#a8854f', border_color:'#d8ccb2', font_family:"'EB Garamond', Georgia, serif", custom_css:'' }; area.innerHTML = `<div class="persona-editor"><h2>${persona?'edit persona':'new persona'}</h2><div class="editor-grid mt"><div class="field full"><label>name</label><input id="pf-name" value="${esc(d.name)}"></div><div class="field"><label>avatar url</label><input id="pf-avatar" value="${esc(d.avatar_url||'')}"></div><div class="field"><label>banner url</label><input id="pf-banner" value="${esc(d.banner_url||'')}"></div>${colorField('bg','background',d.bg_color)}${colorField('tx','text',d.text_color)}${colorField('ac','accent',d.accent_color)}${colorField('bd','border',d.border_color)}<div class="field full"><label>font family</label><input id="pf-font" value="${esc(d.font_family||'')}"></div><div class="field full"><label>signature markdown</label><textarea id="pf-sig">${esc(d.signature||'')}</textarea></div><div class="field full"><label>custom css</label><textarea id="pf-css" style="font-family:var(--mono)">${esc(d.custom_css||'')}</textarea></div></div><div class="spread mt"><div class="row"><button id="pf-save">save persona</button><button class="ghost" id="pf-revert">revert</button></div>${persona?`<button class="danger" id="pf-delete">delete persona</button>`:''}</div><div class="mt2"><h3>live preview</h3><div id="persona-preview"></div></div></div>`; const map={name:'name',avatar:'avatar_url',banner:'banner_url',font:'font_family',sig:'signature',css:'custom_css'}; ['name','avatar','banner','font','sig','css'].forEach(k=>byId(`pf-${k}`).addEventListener('input',e=>{d[map[k]]=e.target.value; updatePreview(d);})); [['bg','bg_color'],['tx','text_color'],['ac','accent_color'],['bd','border_color']].forEach(([k,prop])=>{ const c=byId(`pf-${k}-c`), t=byId(`pf-${k}-t`); c.addEventListener('input',()=>{t.value=c.value; d[prop]=c.value; updatePreview(d);}); t.addEventListener('input',()=>{if(/^#[0-9a-fA-F]{6}$/.test(t.value)){c.value=t.value; d[prop]=t.value; updatePreview(d);}}); }); byId('pf-save').addEventListener('click',()=>safe(async()=>{ if(!d.name.trim()) return toast('name required','err'); const btn=byId('pf-save'); btn.disabled=true; btn.textContent='saving…'; const saved=await savePersona(d); toast('saved'); renderPersonasView(); openPersonaEditor(saved); },'save persona')); byId('pf-revert').addEventListener('click',()=>openPersonaEditor(persona)); if(persona) byId('pf-delete').addEventListener('click',()=>safe(async()=>{ if(!confirm(`Delete "${persona.name}"?`)) return; await deletePersona(persona.id); toast('deleted'); renderPersonasView(); },'delete persona')); updatePreview(d); }
function colorField(k,label,value){ return `<div class="field"><label>${label}</label><div class="color-row"><input type="color" id="pf-${k}-c" value="${esc(value)}"><input type="text" id="pf-${k}-t" value="${esc(value)}"></div></div>`; }
function updatePreview(d){ const box=byId('persona-preview'); if(!box) return; let style=byId('preview-css'); if(!style){ style=document.createElement('style'); style.id='preview-css'; document.head.appendChild(style); } style.textContent = `.post-skin[data-persona-id="preview"]{${d.custom_css || ''}}`; const banner=d.banner_url ? `<div style="background-image:url('${esc(d.banner_url)}');background-size:cover;background-position:center;height:120px;margin:-2rem -2.2rem 1.5rem"></div>`:''; box.innerHTML = `<article class="post-skin" data-persona-id="preview" style="${personaStyle(d)}">${banner}<div class="post-header"><div class="post-avatar" style="${avatarStyle(d)}"></div><div class="post-name">${esc(d.name || 'unnamed')}</div><div class="post-meta">preview</div></div><div class="post-body"><p>This is what your posts will look like. <em>Italic</em>, <strong>bold</strong>, and quotes all ride along.</p><blockquote>A line worth setting apart.</blockquote><h3>A heading</h3><p>Tune it until the character is the one speaking.</p></div>${d.signature?`<div class="post-signature">${md(d.signature)}</div>`:''}</article>`; }
function renderNewThreadModal(){ const wrap=document.createElement('div'); wrap.className='modal-bg'; wrap.innerHTML = `<div class="modal"><button class="modal-close" id="m-close">×</button><h2>New thread</h2><div class="field mt"><label>title</label><input id="m-title" placeholder="give it a name"></div><div class="field"><label>summary or opening note</label><textarea id="m-summary" placeholder="optional; markdown welcome"></textarea></div><div class="spread mt"><button class="ghost" id="m-cancel">cancel</button><button id="m-create">create</button></div></div>`; document.body.appendChild(wrap); const close=()=>{state.modal=null; wrap.remove();}; byId('m-close').addEventListener('click',close); byId('m-cancel').addEventListener('click',close); wrap.addEventListener('click',e=>{if(e.target===wrap)close();}); setTimeout(()=>byId('m-title')?.focus(),0); byId('m-create').addEventListener('click',()=>safe(async()=>{ const title=byId('m-title').value.trim(); const summary=byId('m-summary').value.trim(); if(!title) return toast('title required','err'); const btn=byId('m-create'); btn.disabled=true; btn.textContent='creating…'; const t=await createThread({title,summary}); state.modal=null; wrap.remove(); state.posts=[]; await go(`thread/${t.id}`); toast('thread created'); },'create thread')); }
async function boot(){ await safe(async()=>{ readHash(); await checkSession(); if(state.session){ await loadAll(); if(state.view==='thread' && state.currentThreadId) await loadThreadPosts(state.currentThreadId); } render(); }, 'boot'); }
boot();
</script>
</body>
</html>
