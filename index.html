<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>GAYA</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600&family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:        #f1ebdc;
    --paper:     #fbf6e9;
    --paper-2:   #ede3cc;
    --ink:       #2a221a;
    --ink-soft:  #5c4f3f;
    --ink-faint: #9d8e77;
    --moss:      #4a5d3a;
    --moss-deep: #2c3a22;
    --moss-soft: #6e8556;
    --gold:      #a8854f;
    --gold-soft: #c9a86a;
    --claret:    #6b2c3a;
    --fog:       #d8ccb2;
    --fog-deep:  #b9aa8a;
    --shadow:    0 1px 3px rgba(43,35,27,.08), 0 8px 28px rgba(43,35,27,.07);
    --serif-d:   'Cormorant Garamond', Georgia, serif;
    --serif-b:   'EB Garamond', Georgia, serif;
    --mono:      ui-monospace, 'SF Mono', Menlo, Consolas, monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { font-family: var(--serif-b); font-size: 18px; line-height: 1.65; color: var(--ink); background: var(--bg); min-height: 100vh; }
  body {
    background-image:
      radial-gradient(at 12% 8%, rgba(74,93,58,.05), transparent 55%),
      radial-gradient(at 88% 90%, rgba(107,44,58,.045), transparent 55%);
  }
  ::selection { background: var(--gold-soft); color: var(--ink); }

  h1, h2, h3, h4 { font-family: var(--serif-d); font-weight: 600; letter-spacing: -.005em; line-height: 1.18; color: var(--ink); }
  h1 { font-size: 2.7rem; font-weight: 500; }
  h2 { font-size: 1.85rem; font-weight: 500; }
  h3 { font-size: 1.35rem; }
  h4 { font-size: 1.05rem; letter-spacing: .04em; }

  a { color: var(--moss); text-decoration: none; border-bottom: 1px solid transparent; transition: border-color .2s, color .2s; }
  a:hover { border-bottom-color: var(--gold); }
  button { font-family: var(--serif-b); font-size: 1rem; background: var(--moss-deep); color: var(--paper); border: none; padding: .62rem 1.4rem; border-radius: 2px; cursor: pointer; letter-spacing: .03em; transition: background .2s, transform .05s; }
  button:hover { background: var(--moss); }
  button:active { transform: translateY(1px); }
  button.ghost { background: transparent; color: var(--ink-soft); border: 1px solid var(--fog-deep); }
  button.ghost:hover { background: var(--paper); color: var(--ink); }
  button.danger { background: var(--claret); }
  button.danger:hover { background: #863848; }
  button.tiny { font-size: .82rem; padding: .35rem .8rem; }

  input, textarea, select {
    font-family: var(--serif-b); font-size: 1rem; padding: .68rem .9rem; background: var(--paper);
    border: 1px solid var(--fog-deep); border-radius: 2px; color: var(--ink); width: 100%;
    transition: border-color .2s;
  }
  input:focus, textarea:focus, select:focus { outline: none; border-color: var(--moss); }
  textarea { resize: vertical; font-family: var(--serif-b); line-height: 1.6; }
  textarea.mono { font-family: var(--mono); font-size: .85rem; line-height: 1.55; }
  label { display: block; font-size: .78rem; letter-spacing: .12em; text-transform: uppercase; color: var(--ink-soft); margin-bottom: .35rem; font-family: var(--serif-b); }

  /* Layout */
  .app { display: flex; flex-direction: column; min-height: 100vh; }
  .topbar { display: flex; align-items: center; justify-content: space-between; padding: 1rem 2rem; border-bottom: 1px solid var(--fog); background: var(--paper); position: sticky; top: 0; z-index: 50; }
  .brand { font-family: var(--serif-d); font-size: 1.7rem; font-weight: 600; letter-spacing: .25em; color: var(--moss-deep); display: flex; align-items: center; gap: .7rem; cursor: pointer; }
  .brand .leaf { color: var(--gold); font-size: 1.1rem; transform: translateY(-1px); }
  .nav-tabs { display: flex; gap: 2rem; }
  .nav-tabs a { font-family: var(--serif-d); font-style: italic; color: var(--ink-soft); font-size: 1.2rem; padding-bottom: 3px; border-bottom: 1px solid transparent; }
  .nav-tabs a.active { color: var(--moss-deep); border-bottom-color: var(--gold); }
  .user-strip { display: flex; align-items: center; gap: 1rem; font-size: .88rem; color: var(--ink-soft); font-style: italic; }
  .user-strip button { background: transparent; color: var(--ink-soft); padding: .3rem .8rem; font-size: .82rem; border: 1px solid var(--fog-deep); }
  .user-strip button:hover { background: var(--paper-2); color: var(--ink); }

  .main { flex: 1; max-width: 920px; width: 100%; margin: 0 auto; padding: 3rem 2rem 5rem; }

  .divider { display: flex; align-items: center; justify-content: center; margin: 2.5rem 0; color: var(--gold); font-size: .85rem; letter-spacing: .4em; font-family: var(--serif-d); }
  .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--fog-deep); margin: 0 1rem; }
  .ornament { color: var(--gold); font-family: var(--serif-d); font-style: italic; }

  /* Login */
  .login-screen { position: relative; min-height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; }
  .login-bloom { position: absolute; inset: 0; z-index: 0; opacity: .85; }
  .login-card { position: relative; z-index: 1; max-width: 460px; width: 90%; background: var(--paper); padding: 3rem 2.6rem 2.5rem; border: 1px solid var(--fog-deep); box-shadow: var(--shadow); text-align: center; }
  .login-card::before, .login-card::after {
    content: ''; position: absolute; width: 38px; height: 38px;
    border: 1px solid var(--gold); border-radius: 0;
  }
  .login-card::before { top: 8px; left: 8px; border-right: none; border-bottom: none; }
  .login-card::after  { bottom: 8px; right: 8px; border-left: none; border-top: none; }
  .login-card .brand { justify-content: center; font-size: 2.6rem; margin-bottom: .3rem; cursor: default; }
  .login-tag { font-family: var(--serif-d); font-style: italic; color: var(--ink-soft); margin-bottom: 2rem; font-size: 1.1rem; }
  .login-form { display: flex; flex-direction: column; gap: 1rem; text-align: left; }
  .login-msg { margin-top: 1rem; font-style: italic; color: var(--moss); font-size: .95rem; min-height: 1.4rem; }
  .login-msg.err { color: var(--claret); }

  /* Thread list */
  .page-header { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 1.6rem; }
  .page-header h1 { font-style: italic; }
  .thread-list { display: flex; flex-direction: column; gap: 1.2rem; }
  .thread-card { background: var(--paper); border: 1px solid var(--fog-deep); padding: 1.6rem 1.9rem; cursor: pointer; transition: border-color .2s, box-shadow .2s; position: relative; }
  .thread-card:hover { border-color: var(--moss); box-shadow: var(--shadow); }
  .thread-card h3 { font-size: 1.5rem; margin-bottom: .35rem; font-weight: 600; }
  .thread-card .summary { color: var(--ink-soft); font-style: italic; font-size: 1rem; line-height: 1.55; }
  .thread-card .meta { font-size: .78rem; color: var(--ink-faint); margin-top: .9rem; letter-spacing: .08em; text-transform: uppercase; font-style: normal; }

  /* Empty state */
  .empty-state { text-align: center; padding: 1rem 0 3rem; }
  .empty-bloom { height: 260px; margin: 1rem auto 1.5rem; max-width: 540px; border-radius: 2px; }
  .empty-state h2 { font-style: italic; color: var(--ink-soft); font-weight: 400; margin-bottom: .5rem; }
  .empty-state p { color: var(--ink-faint); font-style: italic; }

  /* Thread view */
  .thread-header { margin-bottom: 1rem; }
  .thread-header h1 { margin-bottom: .5rem; font-style: italic; }
  .thread-summary { font-style: italic; color: var(--ink-soft); font-size: 1.15rem; padding: 1.2rem 1.5rem; border-left: 2px solid var(--gold); background: var(--paper); margin: 1rem 0 2rem; }
  .back-link { font-family: var(--serif-d); font-style: italic; color: var(--ink-soft); font-size: 1rem; margin-bottom: 1rem; display: inline-block; }

  /* Posts */
  .post-skin {
    margin: 2.2rem 0; padding: 2rem 2.2rem;
    background: var(--paper); color: var(--ink);
    border: 1px solid var(--fog-deep);
    --accent: var(--gold);
    position: relative;
    font-family: var(--serif-b);
  }
  .post-skin .post-header { display: flex; align-items: center; gap: 1rem; margin-bottom: 1.3rem; padding-bottom: .9rem; border-bottom: 1px solid currentColor; opacity: .92; }
  .post-skin .post-avatar { width: 52px; height: 52px; border-radius: 50%; background: var(--accent); background-size: cover; background-position: center; flex-shrink: 0; border: 1px solid currentColor; }
  .post-skin .post-name { font-family: var(--serif-d); font-size: 1.4rem; font-weight: 600; letter-spacing: .015em; }
  .post-skin .post-meta { font-size: .72rem; letter-spacing: .14em; text-transform: uppercase; opacity: .55; margin-left: auto; font-family: var(--serif-b); font-style: normal; }
  .post-skin .post-body { font-size: 1.05rem; line-height: 1.75; }
  .post-skin .post-body p { margin: 0 0 1rem; }
  .post-skin .post-body p:last-child { margin-bottom: 0; }
  .post-skin .post-body h1, .post-skin .post-body h2, .post-skin .post-body h3 { font-family: var(--serif-d); margin: 1.6rem 0 .8rem; color: inherit; }
  .post-skin .post-body em { font-style: italic; }
  .post-skin .post-body strong { font-weight: 600; }
  .post-skin .post-body blockquote { border-left: 3px solid currentColor; padding: .2rem 0 .2rem 1.1rem; margin: 1.1rem 0; font-style: italic; opacity: .88; }
  .post-skin .post-body a { color: inherit; border-bottom: 1px solid currentColor; opacity: .85; }
  .post-skin .post-body hr { border: none; border-top: 1px solid currentColor; opacity: .35; margin: 1.5rem 0; }
  .post-skin .post-signature { margin-top: 1.6rem; padding-top: 1rem; border-top: 1px solid currentColor; opacity: .78; font-style: italic; font-size: .98rem; }
  .post-skin .post-actions { margin-top: 1.2rem; display: flex; gap: .6rem; }
  .post-skin .post-actions button { background: transparent; border: 1px solid currentColor; color: currentColor; padding: .25rem .7rem; font-size: .8rem; opacity: .55; font-family: var(--serif-b); }
  .post-skin .post-actions button:hover { opacity: 1; }

  /* Reply composer */
  .composer { margin-top: 3rem; padding: 2rem; background: var(--paper); border: 1px dashed var(--fog-deep); }
  .composer h3 { font-style: italic; font-weight: 400; color: var(--ink-soft); margin-bottom: 1.2rem; }
  .composer .row-top { display: flex; align-items: center; gap: 1rem; margin-bottom: 1rem; flex-wrap: wrap; }
  .composer select { width: auto; min-width: 200px; padding: .55rem .8rem; }
  .composer textarea { min-height: 200px; font-size: 1.05rem; }
  .composer .actions { display: flex; justify-content: space-between; align-items: center; margin-top: 1rem; gap: 1rem; flex-wrap: wrap; }
  .composer .hint { font-size: .85rem; color: var(--ink-faint); font-style: italic; }

  /* Persona page */
  .persona-page { display: grid; grid-template-columns: 280px 1fr; gap: 2rem; }
  @media (max-width: 820px) { .persona-page { grid-template-columns: 1fr; } }
  .persona-sidebar h3 { font-style: italic; font-weight: 400; color: var(--ink-soft); margin-bottom: 1rem; }
  .persona-list { display: flex; flex-direction: column; gap: .4rem; margin-bottom: 1rem; }
  .persona-list-item { padding: .7rem 1rem; background: var(--paper); border: 1px solid var(--fog-deep); cursor: pointer; font-family: var(--serif-d); font-size: 1.15rem; transition: border-color .2s; display: flex; align-items: center; gap: .7rem; }
  .persona-list-item:hover { border-color: var(--moss); }
  .persona-list-item.active { border-color: var(--gold); background: var(--paper-2); }
  .persona-list-item .dot { width: 14px; height: 14px; border-radius: 50%; flex-shrink: 0; border: 1px solid var(--fog-deep); }
  .persona-empty { color: var(--ink-faint); font-style: italic; padding: 1rem; text-align: center; border: 1px dashed var(--fog-deep); }
  .persona-editor { background: var(--paper); border: 1px solid var(--fog-deep); padding: 2rem; }
  .persona-editor h3 { font-style: italic; font-weight: 400; margin-bottom: 1.4rem; }
  .editor-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem 1.2rem; }
  .field { margin-bottom: 1rem; }
  .field.full { grid-column: 1 / -1; }
  .color-row { display: flex; align-items: center; gap: .6rem; }
  .color-row input[type="color"] { width: 48px; height: 36px; padding: 2px; cursor: pointer; flex-shrink: 0; }
  .color-row input[type="text"] { font-family: var(--mono); font-size: .85rem; }
  details.css-toggle { margin-top: 1.5rem; padding-top: 1.2rem; border-top: 1px solid var(--fog); }
  details.css-toggle summary { font-family: var(--serif-d); font-style: italic; color: var(--ink-soft); cursor: pointer; margin-bottom: .8rem; font-size: 1.1rem; }
  details.css-toggle summary::marker { color: var(--gold); }
  .css-hint { font-size: .82rem; color: var(--ink-faint); margin-bottom: .6rem; font-style: italic; }

  .preview-block { margin-top: 2rem; padding-top: 1.5rem; border-top: 1px solid var(--fog); }
  .preview-block h4 { font-family: var(--serif-d); font-style: italic; font-weight: 400; color: var(--ink-soft); margin-bottom: 1rem; }

  /* Modal */
  .modal-bg { position: fixed; inset: 0; background: rgba(43,35,27,.55); display: flex; align-items: center; justify-content: center; z-index: 100; padding: 1rem; }
  .modal { background: var(--paper); padding: 2.5rem; max-width: 600px; width: 100%; box-shadow: var(--shadow); border: 1px solid var(--fog-deep); position: relative; }
  .modal h2 { font-style: italic; margin-bottom: 1.4rem; }
  .modal .actions { display: flex; gap: .8rem; justify-content: flex-end; margin-top: 1.4rem; }
  .modal-close { position: absolute; top: 1rem; right: 1.2rem; background: none; color: var(--ink-faint); padding: .2rem .5rem; font-size: 1.4rem; }
  .modal-close:hover { background: none; color: var(--ink); }

  /* Toast */
  .toast { position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%); background: var(--moss-deep); color: var(--paper); padding: .85rem 1.5rem; font-family: var(--serif-d); font-style: italic; z-index: 200; box-shadow: var(--shadow); font-size: 1.05rem; animation: toast-in .25s ease-out; }
  .toast.err { background: var(--claret); }
  @keyframes toast-in { from { opacity: 0; transform: translate(-50%, 10px); } to { opacity: 1; transform: translate(-50%, 0); } }

  /* Page-fade for view changes */
  .fade-in { animation: fade .35s ease-out; }
  @keyframes fade { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }

  .muted { color: var(--ink-faint); font-style: italic; }
  .row { display: flex; gap: .7rem; align-items: center; }
  .spread { display: flex; justify-content: space-between; align-items: center; gap: 1rem; }
  .mt-1 { margin-top: .5rem; } .mt-2 { margin-top: 1rem; } .mt-3 { margin-top: 1.6rem; } .mt-4 { margin-top: 2.4rem; }
  .center { text-align: center; }
  .nowrap { white-space: nowrap; }
</style>
</head>
<body>
<div id="app"></div>

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2.45.4';
import { marked } from 'https://esm.sh/marked@12.0.2';
import DOMPurify from 'https://esm.sh/dompurify@3.1.6';

// ────────────────────────────────────────────────────────────
// Config
// ────────────────────────────────────────────────────────────
const SUPABASE_URL = 'https://yunwwocryohmvnfwbjig.supabase.co';
const SUPABASE_KEY = 'sb_publishable_XmVMsFZWZ_ZkMQVQyRnAmQ_FqllXED3';
const supa = createClient(SUPABASE_URL, SUPABASE_KEY);

marked.setOptions({ breaks: true, gfm: true });

// ────────────────────────────────────────────────────────────
// State
// ────────────────────────────────────────────────────────────
const state = {
  session: null,
  user: null,
  view: 'threads',           // 'threads' | 'thread' | 'personas'
  currentThreadId: null,
  threads: [],
  posts: [],                  // posts for currentThread, joined with persona
  myPersonas: [],
  allPersonas: [],            // including babytooth's for rendering posts
  selectedPersonaId: null,
  modal: null,                // 'new-thread' | null
  loading: false,
};

const app = document.getElementById('app');

// ────────────────────────────────────────────────────────────
// Utilities
// ────────────────────────────────────────────────────────────
const esc = s => String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const md = s => DOMPurify.sanitize(marked.parse(s || ''), { ADD_ATTR: ['target'] });

function toast(msg, kind = 'ok') {
  const t = document.createElement('div');
  t.className = 'toast' + (kind === 'err' ? ' err' : '');
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2800);
}

function fmtDate(iso) {
  const d = new Date(iso);
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}

// Apply persona CSS scoped to that persona's posts using CSS nesting
function applyPersonaCss(persona) {
  if (!persona) return;
  const id = `skin-css-${persona.id}`;
  let el = document.getElementById(id);
  if (!el) {
    el = document.createElement('style');
    el.id = id;
    document.head.appendChild(el);
  }
  const css = (persona.custom_css || '').trim();
  if (!css) { el.textContent = ''; return; }
  // Wrap in scope using CSS nesting — modern browsers support this natively
  el.textContent = `.post-skin[data-persona-id="${persona.id}"] { ${css} }`;
}

function clearPersonaCss(personaId) {
  const el = document.getElementById(`skin-css-${personaId}`);
  if (el) el.remove();
}

// Inline style block from persona's simple controls
function personaInlineStyle(p) {
  const parts = [];
  if (p.bg_color)     parts.push(`background:${p.bg_color}`);
  if (p.text_color)   parts.push(`color:${p.text_color}`);
  if (p.border_color) parts.push(`border-color:${p.border_color}`);
  if (p.accent_color) parts.push(`--accent:${p.accent_color}`);
  if (p.font_family)  parts.push(`font-family:${p.font_family}`);
  return parts.join(';');
}

function avatarStyle(p) {
  const parts = [`background-color:${p.accent_color || '#a8854f'}`];
  if (p.avatar_url) parts.push(`background-image:url('${esc(p.avatar_url)}')`);
  return parts.join(';');
}

// ────────────────────────────────────────────────────────────
// Auth
// ────────────────────────────────────────────────────────────
async function checkSession() {
  const { data } = await supa.auth.getSession();
  state.session = data.session;
  state.user = data.session?.user || null;
}

async function sendMagicLink(email) {
  const redirectTo = window.location.origin + window.location.pathname;
  const { error } = await supa.auth.signInWithOtp({
    email,
    options: { emailRedirectTo: redirectTo, shouldCreateUser: false }
  });
  return error;
}

async function signOut() {
  await supa.auth.signOut();
  state.session = null;
  state.user = null;
  state.threads = []; state.posts = []; state.myPersonas = []; state.allPersonas = [];
  render();
}

supa.auth.onAuthStateChange(async (event, session) => {
  state.session = session;
  state.user = session?.user || null;
  if (session) {
    await loadAll();
  }
  render();
});

// ────────────────────────────────────────────────────────────
// Data
// ────────────────────────────────────────────────────────────
async function loadAll() {
  await Promise.all([loadThreads(), loadPersonas()]);
}

async function loadThreads() {
  const { data, error } = await supa.from('threads')
    .select('*')
    .order('updated_at', { ascending: false });
  if (error) { toast('Could not load threads', 'err'); return; }
  state.threads = data || [];
}

async function loadPersonas() {
  const { data, error } = await supa.from('personas')
    .select('*')
    .order('created_at', { ascending: true });
  if (error) { toast('Could not load personas', 'err'); return; }
  state.allPersonas = data || [];
  state.myPersonas = (data || []).filter(p => p.user_id === state.user?.id);
  // Apply all custom CSS so it's available wherever posts render
  state.allPersonas.forEach(applyPersonaCss);
}

async function loadThreadPosts(threadId) {
  const { data, error } = await supa.from('posts')
    .select('*, persona:personas(*)')
    .eq('thread_id', threadId)
    .order('created_at', { ascending: true });
  if (error) { toast('Could not load posts', 'err'); return; }
  state.posts = data || [];
}

async function createThread({ title, summary }) {
  const { data, error } = await supa.from('threads')
    .insert({ title, summary, created_by: state.user.id })
    .select().single();
  if (error) { toast('Could not create thread', 'err'); return null; }
  state.threads.unshift(data);
  return data;
}

async function createPost({ thread_id, persona_id, body }) {
  const { data, error } = await supa.from('posts')
    .insert({ thread_id, persona_id, author_id: state.user.id, body })
    .select('*, persona:personas(*)').single();
  if (error) { toast('Could not post', 'err'); return null; }
  state.posts.push(data);
  // Bump thread updated_at
  await supa.from('threads').update({ updated_at: new Date().toISOString() }).eq('id', thread_id);
  return data;
}

async function deletePost(id) {
  const { error } = await supa.from('posts').delete().eq('id', id);
  if (error) { toast('Could not delete', 'err'); return; }
  state.posts = state.posts.filter(p => p.id !== id);
}

async function savePersona(persona) {
  const payload = {
    name: persona.name,
    avatar_url: persona.avatar_url || null,
    bg_color: persona.bg_color,
    text_color: persona.text_color,
    accent_color: persona.accent_color,
    border_color: persona.border_color,
    font_family: persona.font_family,
    banner_url: persona.banner_url || null,
    signature: persona.signature || null,
    custom_css: persona.custom_css || null,
    updated_at: new Date().toISOString(),
  };
  if (persona.id) {
    const { data, error } = await supa.from('personas').update(payload).eq('id', persona.id).select().single();
    if (error) { toast('Could not save persona', 'err'); return null; }
    return data;
  } else {
    payload.user_id = state.user.id;
    const { data, error } = await supa.from('personas').insert(payload).select().single();
    if (error) { toast('Could not create persona', 'err'); return null; }
    return data;
  }
}

async function deletePersona(id) {
  const { error } = await supa.from('personas').delete().eq('id', id);
  if (error) { toast('Could not delete persona', 'err'); return; }
  clearPersonaCss(id);
  state.allPersonas = state.allPersonas.filter(p => p.id !== id);
  state.myPersonas = state.myPersonas.filter(p => p.id !== id);
}

// ────────────────────────────────────────────────────────────
// Bloom field — reusable mount
// ────────────────────────────────────────────────────────────
const palettes = [
  ['#6b2c3a','#a8854f','#4a5d3a','#c9a86a','#6e8556'],   // gaya house palette
  ['#E24B4A','#EF9F27','#F0997B','#FAC775','#D4537E'],
  ['#9FE1CB','#5DCAA5','#C0DD97','#FAC775','#F4C0D1'],
  ['#7F77DD','#534AB7','#D85A30','#EF9F27','#993556'],
];

function mountBloomField(container, opts = {}) {
  const canvas = document.createElement('canvas');
  canvas.style.cssText = 'display:block;width:100%;height:100%;cursor:' + (opts.interactive === false ? 'default' : 'crosshair') + ';touch-action:none;';
  container.appendChild(canvas);
  const ctx = canvas.getContext('2d');
  let W = 0, H = 0;
  const dpr = window.devicePixelRatio || 1;
  let raf;
  let palette = opts.paletteIndex != null ? palettes[opts.paletteIndex] : palettes[0];
  const flowers = [];
  const maxFlowers = opts.maxFlowers || 220;
  const wind = () => opts.wind != null ? opts.wind : 0.15;

  function resize() {
    const r = canvas.getBoundingClientRect();
    W = r.width; H = r.height;
    canvas.width = Math.floor(W * dpr);
    canvas.height = Math.floor(H * dpr);
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  function make(x, y) {
    const petalCount = 5 + Math.floor(Math.random()*6);
    const petalSize = 5 + Math.random()*9;
    const ci = Math.floor(Math.random()*palette.length);
    return { x, y, petalCount, petalSize,
      color: palette[ci], centerColor: palette[(ci+2)%palette.length],
      rotation: Math.random()*Math.PI*2, age: 0,
      swayOff: Math.random()*Math.PI*2, swayAmt: .4 + Math.random()*.6, driftX: 0 };
  }
  function plant(x, y) {
    if (flowers.length >= maxFlowers) flowers.shift();
    flowers.push(make(x, y));
  }
  function draw() {
    ctx.clearRect(0,0,W,H);
    const w = wind(), t = performance.now()/1000;
    for (const f of flowers) {
      if (f.age < 1) f.age += 0.05;
      f.driftX += w * 0.04 * f.swayAmt;
      const sway = Math.sin(t*1.2 + f.swayOff) * (3 + Math.abs(w)*4) * f.swayAmt;
      const lean = w * 6 * f.swayAmt;
      const span = W + 60;
      const rawCx = f.x + f.driftX + sway + lean;
      const cx = ((rawCx + 30) % span + span) % span - 30;
      const cy = f.y + Math.sin(t*.7 + f.swayOff) * 2;
      const sc = f.age;
      ctx.fillStyle = f.color;
      for (let i=0;i<f.petalCount;i++){
        const a = f.rotation + (i/f.petalCount)*Math.PI*2;
        ctx.beginPath();
        ctx.arc(cx + Math.cos(a)*f.petalSize*.9*sc, cy + Math.sin(a)*f.petalSize*.9*sc, f.petalSize*sc, 0, Math.PI*2);
        ctx.fill();
      }
      ctx.fillStyle = f.centerColor;
      ctx.beginPath();
      ctx.arc(cx, cy, f.petalSize*.55*sc, 0, Math.PI*2);
      ctx.fill();
    }
    raf = requestAnimationFrame(draw);
  }
  let dragging = false, last = 0;
  function pos(e){ const r=canvas.getBoundingClientRect(); return {x:e.clientX-r.left,y:e.clientY-r.top}; }
  if (opts.interactive !== false) {
    canvas.addEventListener('pointerdown', e => { dragging=true; try{canvas.setPointerCapture(e.pointerId);}catch(_){} const p=pos(e); plant(p.x,p.y); last=performance.now(); });
    canvas.addEventListener('pointermove', e => { if(!dragging)return; const n=performance.now(); if(n-last<70)return; last=n; const p=pos(e); plant(p.x,p.y); });
    canvas.addEventListener('pointerup', () => dragging=false);
    canvas.addEventListener('pointercancel', () => dragging=false);
  }
  if (typeof ResizeObserver !== 'undefined') new ResizeObserver(resize).observe(canvas);
  else window.addEventListener('resize', resize);
  resize();
  const seed = opts.seed || 18;
  for (let i=0;i<seed;i++) plant(20 + Math.random()*(W-40), 20 + Math.random()*(H-40));
  draw();
  return () => { cancelAnimationFrame(raf); canvas.remove(); };
}

  `;

function renderPosts() {
  const list = document.getElementById('posts-list');
  if (state.posts.length === 0) {
    list.innerHTML = `<p class="muted center">no posts yet — be the first to write</p>`;
    return;
  }
  list.innerHTML = state.posts.map(p => {
    const persona = p.persona;
    const mine = p.author_id === state.user?.id;
    if (!persona) {
      return `<div class="post-skin" data-id="${p.id}">
        <div class="post-header"><div class="post-name">unknown persona</div><div class="post-meta">${fmtDate(p.created_at)}</div></div>
        <div class="post-body">${md(p.body)}</div>
        ${mine ? `<div class="post-actions"><button class="post-delete" data-id="${p.id}">delete</button></div>` : ''}
      </div>`;
    }
    const inline = personaInlineStyle(persona);
    const banner = persona.banner_url ? `<div style="background-image:url('${esc(persona.banner_url)}');background-size:cover;background-position:center;height:120px;margin:-2rem -2.2rem 1.5rem;"></div>` : '';
    return `<div class="post-skin" data-persona-id="${persona.id}" data-id="${p.id}" style="${inline}">
      ${banner}
      <div class="post-header">
        <div class="post-avatar" style="${avatarStyle(persona)}"></div>
        <div class="post-name">${esc(persona.name)}</div>
        <div class="post-meta">${fmtDate(p.created_at)}</div>
      </div>
      <div class="post-body">${md(p.body)}</div>
      ${persona.signature ? `<div class="post-signature">${md(persona.signature)}</div>` : ''}
      ${mine ? `<div class="post-actions"><button class="post-delete" data-id="${p.id}">delete</button></div>` : ''}
    </div>`;
  }).join('');
  document.querySelectorAll('.post-delete').forEach(b => {
    b.addEventListener('click', async (e) => {
      e.stopPropagation();
      if (!confirm('Delete this post?')) return;
      await deletePost(b.dataset.id);
      renderPosts();
    });
  });
}

function renderComposer() {
  const wrap = document.getElementById('composer-wrap');
  if (state.myPersonas.length === 0) {
    wrap.innerHTML = `<div class="composer">
      <h3>to reply, first make a persona</h3>
      <p class="muted">go to <a href="#personas">personas</a> and create one — it's how the post knows what to wear.</p>
    </div>`;
    return;
  }
  if (state.selectedPersonaId == null || !state.myPersonas.find(p => p.id === state.selectedPersonaId)) {
    state.selectedPersonaId = state.myPersonas[0].id;
  }
  wrap.innerHTML = `<div class="composer">
    <h3>reply</h3>
    <div class="row-top">
      <label style="margin:0;">as</label>
      <select id="persona-select">
        ${state.myPersonas.map(p => `<option value="${p.id}" ${p.id===state.selectedPersonaId?'selected':''}>${esc(p.name)}</option>`).join('')}
      </select>
    </div>
    <textarea id="composer-body" placeholder="markdown welcome — *italic*, **bold**, > quotes, headings, links…"></textarea>
    <div class="actions">
      <div class="hint">markdown renders inside your persona's skin</div>
      <button id="post-btn">post</button>
    </div>
  </div>`;
  document.getElementById('persona-select').addEventListener('change', e => state.selectedPersonaId = e.target.value);
  document.getElementById('post-btn').addEventListener('click', async () => {
    const body = document.getElementById('composer-body').value.trim();
    if (!body) { toast('write something first', 'err'); return; }
    const btn = document.getElementById('post-btn');
    btn.disabled = true; btn.textContent = 'posting…';
    await createPost({ thread_id: state.currentThreadId, persona_id: state.selectedPersonaId, body });
    document.getElementById('composer-body').value = '';
    btn.disabled = false; btn.textContent = 'post';
    renderPosts();
    toast('posted');
  });

function openPersonaEditor(persona) {
  // Mark active in sidebar
  document.querySelectorAll('.persona-list-item').forEach(el => el.classList.toggle('active', persona && el.dataset.id === persona.id));
  // Make a working copy
  const draft = persona ? { ...persona } : {
    id: null, name: 'new persona',
    avatar_url: '', banner_url: '', signature: '',
    bg_color: '#fbf6e9', text_color: '#2a221a',
    accent_color: '#a8854f', border_color: '#d8ccb2',
    font_family: "'EB Garamond', Georgia, serif",
    custom_css: '',
  };
  const area = document.getElementById('persona-edit-area');
  area.innerHTML = `
    <div class="persona-editor">
      <h3>${persona ? 'edit persona' : 'new persona'}</h3>
      <div class="editor-grid">
        <div class="field full">
          <label>name</label>
          <input id="pf-name" value="${esc(draft.name)}" />
        </div>
        <div class="field"><label>avatar url</label><input id="pf-avatar" value="${esc(draft.avatar_url||'')}" placeholder="optional" /></div>
        <div class="field"><label>banner url</label><input id="pf-banner" value="${esc(draft.banner_url||'')}" placeholder="optional" /></div>
        <div class="field"><label>background</label><div class="color-row"><input type="color" id="pf-bg-c" value="${draft.bg_color}" /><input type="text" id="pf-bg-t" value="${draft.bg_color}" /></div></div>
        <div class="field"><label>text</label><div class="color-row"><input type="color" id="pf-tx-c" value="${draft.text_color}" /><input type="text" id="pf-tx-t" value="${draft.text_color}" /></div></div>
        <div class="field"><label>accent</label><div class="color-row"><input type="color" id="pf-ac-c" value="${draft.accent_color}" /><input type="text" id="pf-ac-t" value="${draft.accent_color}" /></div></div>
        <div class="field"><label>border</label><div class="color-row"><input type="color" id="pf-bd-c" value="${draft.border_color}" /><input type="text" id="pf-bd-t" value="${draft.border_color}" /></div></div>
        <div class="field full"><label>font family</label><input id="pf-font" value="${esc(draft.font_family)}" placeholder="e.g. 'EB Garamond', serif" /></div>
        <div class="field full"><label>signature (markdown)</label><textarea id="pf-sig" style="min-height:70px;">${esc(draft.signature || '')}</textarea></div>
      </div>
      <details class="css-toggle" ${draft.custom_css ? 'open' : ''}>
        <summary>custom css (advanced)</summary>
        <div class="css-hint">styles here are scoped to this persona's posts only. selectors like <code>h2</code>, <code>p</code>, <code>blockquote</code>, <code>.post-name</code>, <code>.post-body</code> work. <code>&</code> targets the post container itself.</div>
        <textarea id="pf-css" class="mono" style="min-height:200px;" placeholder="& { box-shadow: 0 0 0 1px var(--accent); }\nh2 { font-style: italic; }">${esc(draft.custom_css || '')}</textarea>
      </details>
      <div class="row mt-3 spread">
        <div class="row">
          <button id="pf-save">save persona</button>
          <button class="ghost" id="pf-revert">revert</button>
        </div>
        ${persona ? `<button class="danger" id="pf-delete">delete persona</button>` : ''}
      </div>
      <div class="preview-block">
        <h4>live preview</h4>
        <div id="persona-preview"></div>
      </div>
    </div>
  `;

  // Two-way sync color picker + hex input
  const pairs = [['bg','bg_color'],['tx','text_color'],['ac','accent_color'],['bd','border_color']];
  pairs.forEach(([k, prop]) => {
    const c = document.getElementById(`pf-${k}-c`);
    const t = document.getElementById(`pf-${k}-t`);
    c.addEventListener('input', () => { t.value = c.value; draft[prop] = c.value; updatePreview(); });
    t.addEventListener('input', () => { if (/^#[0-9a-fA-F]{6}$/.test(t.value)) { c.value = t.value; draft[prop] = t.value; updatePreview(); } });
  });
  ['name','avatar','banner','font','sig','css'].forEach(k => {
    const map = { name: 'name', avatar: 'avatar_url', banner: 'banner_url', font: 'font_family', sig: 'signature', css: 'custom_css' };
    const el = document.getElementById(`pf-${k}`);
    el.addEventListener('input', () => { draft[map[k]] = el.value; updatePreview(); });
  });

  function updatePreview() {
    // Temporary CSS for live preview using a stable id
    const previewId = 'live-preview-' + (draft.id || 'new');
    draft._previewId = previewId;
    let style = document.getElementById('preview-css');
    if (!style) { style = document.createElement('style'); style.id = 'preview-css'; document.head.appendChild(style); }
    style.textContent = `.post-skin[data-persona-id="${previewId}"] { ${draft.custom_css || ''} }`;
    const inline = personaInlineStyle(draft);
    const banner = draft.banner_url ? `<div style="background-image:url('${esc(draft.banner_url)}');background-size:cover;background-position:center;height:120px;margin:-2rem -2.2rem 1.5rem;"></div>` : '';
    document.getElementById('persona-preview').innerHTML = `
      <div class="post-skin" data-persona-id="${previewId}" style="${inline}">
        ${banner}
        <div class="post-header">
          <div class="post-avatar" style="${avatarStyle(draft)}"></div>
          <div class="post-name">${esc(draft.name || 'unnamed')}</div>
          <div class="post-meta">preview</div>
        </div>
        <div class="post-body">
          <p>This is what your posts will look like. <em>Italic</em> and <strong>bold</strong> ride along. Quotes get the left edge:</p>
          <blockquote>A line worth setting apart.</blockquote>
          <p>Headings cascade through your font family.</p>
          <h3>A heading</h3>
          <p>Tune the colors and the typography until it feels like the character is the one speaking.</p>
        </div>
        ${draft.signature ? `<div class="post-signature">${md(draft.signature)}</div>` : ''}
      </div>
    `;
  }
  updatePreview();

  document.getElementById('pf-save').addEventListener('click', async () => {
    if (!draft.name?.trim()) { toast('name required', 'err'); return; }
    const btn = document.getElementById('pf-save');
    btn.disabled = true; btn.textContent = 'saving…';
    const saved = await savePersona(draft);
    btn.disabled = false; btn.textContent = 'save persona';
    if (saved) {
      // Replace or add in state
      const i = state.allPersonas.findIndex(p => p.id === saved.id);
      if (i >= 0) state.allPersonas[i] = saved; else state.allPersonas.push(saved);
      state.myPersonas = state.allPersonas.filter(p => p.user_id === state.user.id);
      applyPersonaCss(saved);
      toast('saved');
      renderPersonaList();
      openPersonaEditor(saved);
    }
  });
  document.getElementById('pf-revert').addEventListener('click', () => openPersonaEditor(persona));
  if (persona) {
    document.getElementById('pf-delete').addEventListener('click', async () => {
      if (!confirm(`Delete "${persona.name}"? Posts written as this persona will lose their skin but the text stays.`)) return;
      await deletePersona(persona.id);
      toast('deleted');
      renderPersonasView();
    });
  }
}

        <textarea id="m-summary" style="min-height:140px;" placeholder="set the scene, or leave blank and let the first post do it"></textarea>
      </div>
      <div class="actions">
        <button class="ghost" id="m-cancel">cancel</button>
        <button id="m-create">create</button>
      </div>
    </div>
  `;
  document.body.appendChild(wrap);
  const close = () => { state.modal = null; wrap.remove(); };
  document.getElementById('m-close').addEventListener('click', close);
  document.getElementById('m-cancel').addEventListener('click', close);
  wrap.addEventListener('click', e => { if (e.target === wrap) close(); });
  document.getElementById('m-create').addEventListener('click', async () => {
    const title = document.getElementById('m-title').value.trim();
    const summary = document.getElementById('m-summary').value.trim();
    if (!title) { toast('title required', 'err'); return; }
    const btn = document.getElementById('m-create');
    btn.disabled = true; btn.textContent = 'creating…';
    const t = await createThread({ title, summary });
    btn.disabled = false; btn.textContent = 'create';
    if (t) { close(); go(`thread/${t.id}`); toast('thread created'); }
  });
}

// ────────────────────────────────────────────────────────────
// Boot
// ────────────────────────────────────────────────────────────
async function boot() {
  readHash();
  await checkSession();
  if (state.session) {
    await loadAll();
    if (state.view === 'thread' && state.currentThreadId) {
      await loadThreadPosts(state.currentThreadId);
    }
  }
  render();
}
boot();
</script>
</body>
</html>
