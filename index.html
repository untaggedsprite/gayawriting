<style>
:root{--bg:#f1ebdc;--paper:#fbf6e9;--paper2:#ede3cc;--ink:#2a221a;--soft:#5c4f3f;--faint:#9d8e77;--moss:#4a5d3a;--deep:#2c3a22;--gold:#a8854f;--claret:#6b2c3a;--fog:#b9aa8a;--serifD:'Cormorant Garamond',Georgia,serif;--serifB:'EB Garamond',Georgia,serif;--shadow:0 1px 3px rgba(43,35,27,.08),0 8px 28px rgba(43,35,27,.07)}
*{box-sizing:border-box}body{margin:0;min-height:100vh;background:var(--bg);color:var(--ink);font-family:var(--serifB);font-size:18px;line-height:1.65;background-image:radial-gradient(at 12% 8%,rgba(74,93,58,.06),transparent 55%),radial-gradient(at 88% 90%,rgba(107,44,58,.05),transparent 55%)}h1,h2,h3{font-family:var(--serifD);font-weight:500;margin:0;line-height:1.15}h1{font-size:2.5rem;font-style:italic}h2{font-size:1.7rem;font-style:italic}button{font:inherit;background:var(--deep);color:var(--paper);border:0;border-radius:2px;padding:.62rem 1.2rem;cursor:pointer}button:hover{background:var(--moss)}button:disabled{opacity:.6}.ghost{background:transparent;color:var(--soft);border:1px solid var(--fog)}.danger{background:var(--claret)}input,textarea,select{width:100%;font:inherit;background:var(--paper);color:var(--ink);border:1px solid var(--fog);border-radius:2px;padding:.65rem .85rem}input[type=color]{height:43px;padding:2px}textarea{min-height:130px;resize:vertical}label{display:block;margin:0 0 .35rem;color:var(--soft);font-size:.78rem;letter-spacing:.12em;text-transform:uppercase}a{color:var(--moss);text-decoration:none;border-bottom:1px solid transparent}.main{width:100%;max-width:980px;margin:0 auto;padding:3rem 2rem 5rem}.top{position:sticky;top:0;z-index:2;background:var(--paper);border-bottom:1px solid var(--fog);padding:1rem 2rem;display:flex;gap:1rem;align-items:center;justify-content:space-between}.brand{font-family:var(--serifD);font-size:1.7rem;font-weight:600;letter-spacing:.25em;color:var(--deep);cursor:pointer}.leaf{color:var(--gold);letter-spacing:0}.tabs{display:flex;gap:1.5rem}.tabs a{font-family:var(--serifD);font-style:italic;font-size:1.2rem;color:var(--soft)}.tabs a.active{color:var(--deep);border-bottom-color:var(--gold)}.user{display:flex;gap:.7rem;align-items:center;color:var(--soft);font-style:italic;font-size:.9rem}.login{min-height:100vh;display:grid;place-items:center;padding:1rem}.card,.thread,.post,.composer,.error,.persona-card,.editor{background:var(--paper);border:1px solid var(--fog);box-shadow:var(--shadow);padding:2rem}.login .card{width:min(460px,92vw);text-align:center;padding:3rem 2.5rem}.login .brand{font-size:2.5rem;cursor:default}.muted{color:var(--faint);font-style:italic}.msg{min-height:1.4rem;margin-top:.9rem;color:var(--moss);font-style:italic}.msg.err{color:var(--claret)}.header{display:flex;align-items:baseline;justify-content:space-between;gap:1rem;margin-bottom:1.5rem}.thread-list{display:flex;flex-direction:column;gap:1rem}.thread{box-shadow:none;cursor:pointer}.thread:hover{border-color:var(--moss);box-shadow:var(--shadow)}.summary{color:var(--soft);font-style:italic}.meta{margin-top:.8rem;color:var(--faint);font-size:.78rem;letter-spacing:.08em;text-transform:uppercase}.back{display:inline-block;margin-bottom:1rem;font-family:var(--serifD);font-style:italic}.thread-summary{border-left:2px solid var(--gold);background:var(--paper);padding:1rem 1.25rem;margin:1rem 0 2rem;color:var(--soft);font-style:italic}.divider{display:flex;align-items:center;justify-content:center;color:var(--gold);letter-spacing:.35em;margin:2.2rem 0}.divider:before,.divider:after{content:"";height:1px;background:var(--fog);flex:1;margin:0 1rem}.post{box-shadow:none;margin:2rem 0}.post-head{display:flex;gap:1rem;align-items:center;border-bottom:1px solid currentColor;padding-bottom:.8rem;margin-bottom:1.2rem;opacity:.9}.avatar{width:52px;height:52px;border-radius:50%;background:var(--gold);background-size:cover;background-position:center;border:1px solid currentColor;flex:0 0 auto}.post-name{font-family:var(--serifD);font-size:1.4rem;font-weight:600}.post-meta{margin-left:auto;font-size:.72rem;letter-spacing:.12em;text-transform:uppercase;opacity:.55}.composer{border-style:dashed;box-shadow:none;margin-top:3rem}.row{display:flex;gap:.75rem;align-items:center;flex-wrap:wrap}.spread{display:flex;gap:1rem;align-items:center;justify-content:space-between;flex-wrap:wrap}.mt{margin-top:1rem}.mt2{margin-top:2rem}.center{text-align:center}.modal-bg{position:fixed;inset:0;background:rgba(43,35,27,.55);display:grid;place-items:center;z-index:20;padding:1rem}.modal{width:min(620px,94vw);background:var(--paper);border:1px solid var(--fog);box-shadow:var(--shadow);padding:2rem;position:relative}.close{position:absolute;right:1rem;top:.8rem;background:transparent;color:var(--faint);font-size:1.5rem;padding:.1rem .5rem}.toast{position:fixed;left:50%;bottom:2rem;transform:translateX(-50%);z-index:30;background:var(--deep);color:var(--paper);padding:.8rem 1.3rem;box-shadow:var(--shadow);font-style:italic}.toast.err{background:var(--claret)}pre{white-space:pre-wrap;background:var(--paper2);padding:1rem;overflow:auto;font-family:ui-monospace,monospace;font-size:.82rem}.persona-layout{display:grid;grid-template-columns:280px minmax(0,1fr);gap:2rem}.persona-list{display:flex;flex-direction:column;gap:.5rem}.persona-card{box-shadow:none;padding:1rem;cursor:pointer}.persona-card.active{background:var(--paper2);border-color:var(--gold)}.dot{display:inline-block;width:14px;height:14px;border-radius:50%;border:1px solid var(--fog);margin-right:.5rem;vertical-align:-1px}.editor-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem}.field.full{grid-column:1/-1}.color-pair{display:grid;grid-template-columns:54px 1fr;gap:.5rem}.preview-note{margin-top:.5rem;font-size:.9rem}.banner{height:120px;margin:-2rem -2rem 1.25rem;background-size:cover;background-position:center;border-bottom:1px solid currentColor;opacity:.9}@media(max-width:760px){.top{align-items:flex-start;flex-direction:column;padding:1rem}.main{padding:2rem 1rem 4rem}.header{align-items:flex-start;flex-direction:column}.user{width:100%;justify-content:space-between}.persona-layout,.editor-grid{grid-template-columns:1fr}}
</style>

<body><div id="app"><div class="main"><p class="muted">loading GAYA…</p></div></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL='https://yunwwocryohmvnfwbjig.supabase.co';
const SUPABASE_KEY='sb_publishable_XmVMsFZWZ_ZkMQVQyRnAmQ_FqllXED3';
const app=document.getElementById('app');
const state={session:null,user:null,view:'threads',threadId:null,threads:[],posts:[],personas:[],mine:[],selectedPersonaId:null,editPersonaId:null,modal:null,fatal:null};
const esc=v=>String(v??'').replace(/[&<>"']/g,ch=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));
const $=id=>document.getElementById(id);
let supa=null;
function md(v){let s=esc(v||'');s=s.replace(/^### (.*)$/gm,'<h3>$1</h3>').replace(/^## (.*)$/gm,'<h2>$1</h2>').replace(/^# (.*)$/gm,'<h1>$1</h1>').replace(/^&gt; (.*)$/gm,'<blockquote>$1</blockquote>').replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>').replace(/\*([^*]+)\*/g,'<em>$1</em>').replace(/\n{2,}/g,'</p><p>').replace(/\n/g,'<br>');return '<p>'+s+'</p>';}
function dateLabel(iso){const d=new Date(iso||'');return Number.isNaN(d.getTime())?'undated':d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});}
function toast(m,k='ok'){const el=document.createElement('div');el.className='toast'+(k==='err'?' err':'');el.textContent=m;document.body.appendChild(el);setTimeout(()=>el.remove(),3200);}
function fail(e,w='runtime'){console.error(w,e);state.fatal={where:w,message:e&&e.message?e.message:String(e),stack:e&&e.stack?e.stack:''};renderFatal();}
async function safe(fn,w){try{return await fn();}catch(e){fail(e,w);return null;}}
window.addEventListener('error',e=>fail(e.error||e.message,'runtime error'));
window.addEventListener('unhandledrejection',e=>fail(e.reason,'unhandled promise'));
function readRoute(){const h=(location.hash||'#threads').slice(1);if(h.startsWith('thread/')){state.view='thread';state.threadId=h.slice(7);}else if(h==='personas'){state.view='personas';state.threadId=null;}else{state.view='threads';state.threadId=null;}}
function go(hash){if(location.hash==='#'+hash){readRoute();return refreshRoute();}location.hash=hash;}
window.addEventListener('hashchange',()=>safe(refreshRoute,'hash navigation'));
async function refreshRoute(){readRoute();if(state.session&&state.view==='thread'&&state.threadId)await loadPosts(state.threadId);render();}
async function boot(){await safe(async()=>{if(!window.supabase||!window.supabase.createClient)throw new Error('Supabase browser library did not load. CDN may be blocked.');supa=window.supabase.createClient(SUPABASE_URL,SUPABASE_KEY);readRoute();await checkSession();supa.auth.onAuthStateChange((_event,session)=>safe(async()=>{state.session=session;state.user=session&&session.user?session.user:null;if(session)await loadAll();render();},'auth change'));if(state.session){await loadAll();if(state.view==='thread'&&state.threadId)await loadPosts(state.threadId);}render();},'boot');}
async function checkSession(){const {data,error}=await supa.auth.getSession();if(error)throw error;state.session=data.session;state.user=data.session&&data.session.user?data.session.user:null;}
async function loadThreads(){const {data,error}=await supa.from('threads').select('*').order('updated_at',{ascending:false});if(error)throw error;state.threads=data||[];}
async function loadPersonas(){const {data,error}=await supa.from('personas').select('*').order('created_at',{ascending:true});if(error)throw error;state.personas=data||[];state.mine=state.personas.filter(p=>p.user_id===state.user?.id);}
async function loadPosts(id){const {data,error}=await supa.from('posts').select('*, persona:personas(*)').eq('thread_id',id).order('created_at',{ascending:true});if(error)throw error;state.posts=data||[];}
async function loadAll(){await Promise.all([loadThreads(),loadPersonas()]);}
async function magicLink(email){const redirectTo=window.location.origin+window.location.pathname;return await supa.auth.signInWithOtp({email,options:{emailRedirectTo:redirectTo,shouldCreateUser:false}});}
async function signOut(){await supa.auth.signOut();Object.assign(state,{session:null,user:null,threads:[],posts:[],personas:[],mine:[],view:'threads',threadId:null});render();}
async function createThread(title,summary){const {data,error}=await supa.from('threads').insert({title,summary:summary||null,created_by:state.user.id}).select('*').single();if(error)throw error;await loadThreads();return data;}
async function createPost(body){const personaId=state.selectedPersonaId||state.mine[0]?.id;if(!personaId)throw new Error('No persona is visible for this account yet. Create one on the personas page first.');const {data,error}=await supa.from('posts').insert({thread_id:state.threadId,persona_id:personaId,author_id:state.user.id,body}).select('*, persona:personas(*)').single();if(error)throw error;state.posts.push(data);await supa.from('threads').update({updated_at:new Date().toISOString()}).eq('id',state.threadId);return data;}
async function savePersona(payload,id){let res;if(id){res=await supa.from('personas').update(payload).eq('id',id).select('*').single();}else{payload.user_id=state.user.id;res=await supa.from('personas').insert(payload).select('*').single();}if(res.error)throw res.error;await loadPersonas();return res.data;}
async function deletePersona(id){const {error}=await supa.from('personas').delete().eq('id',id);if(error)throw error;await loadPersonas();}
function render(){if(state.fatal)return renderFatal();if(!state.session)return renderLogin();renderShell();}
function renderFatal(){app.innerHTML='<div class="main"><div class="error"><h1>GAYA tripped on a root.</h1><p class="muted">The app caught the error instead of staying blank.</p><pre>'+esc(state.fatal?.where)+'\n'+esc(state.fatal?.message)+'\n'+esc(state.fatal?.stack)+'</pre><button id="retry">try again</button></div></div>';$('retry').onclick=()=>{state.fatal=null;boot();};}
function renderLogin(){app.innerHTML='<div class="login"><div class="card"><div class="brand"><span class="leaf">❦</span> GAYA <span class="leaf">❦</span></div><p class="muted">a little garden, for the two of us</p><form id="login-form"><label for="email">email</label><input id="email" type="email" required autocomplete="email" placeholder="you@somewhere.com"><button class="mt" type="submit">send the link</button><div class="msg" id="login-msg"></div></form></div></div>';$('login-form').onsubmit=e=>safe(async()=>{e.preventDefault();const msg=$('login-msg');msg.className='msg';msg.textContent='sending…';const {error}=await magicLink($('email').value.trim());if(error){msg.className='msg err';msg.textContent=error.message||'something went wrong.';}else msg.textContent='check your inbox. the link will sign you in.';},'send magic link');}
function renderShell(){const threadsActive=state.view==='thread'||state.view==='threads'?'active':'';const personasActive=state.view==='personas'?'active':'';app.innerHTML='<div class="app"><div class="top"><div class="brand" id="brand"><span class="leaf">❦</span> GAYA</div><nav class="tabs"><a class="'+threadsActive+'" href="#threads">threads</a><a class="'+personasActive+'" href="#personas">personas</a></nav><div class="user"><span>'+esc(state.user?.email||'')+'</span><button class="ghost" id="signout">sign out</button></div></div><main class="main" id="main"></main></div>';$('brand').onclick=()=>go('threads');$('signout').onclick=()=>safe(signOut,'sign out');if(state.view==='thread')renderThread();else if(state.view==='personas')renderPersonas();else renderThreads();if(state.modal==='new-thread')renderNewThreadModal();}
function renderThreads(){let body='<div class="header"><h1>Threads</h1><button id="new-thread">＋ new thread</button></div>';if(!state.threads.length)body+='<div class="center"><h2>nothing planted yet</h2><p class="muted">start the first thread above</p></div>';else body+='<div class="thread-list">'+state.threads.map(t=>'<article class="thread" data-id="'+esc(t.id)+'"><h3>'+esc(t.title)+'</h3>'+(t.summary?'<div class="summary">'+esc(t.summary).slice(0,220)+'</div>':'')+'<div class="meta">last activity · '+dateLabel(t.updated_at||t.created_at)+'</div></article>').join('')+'</div>';$('main').innerHTML=body;$('new-thread').onclick=()=>{state.modal='new-thread';render();};document.querySelectorAll('.thread').forEach(el=>el.onclick=()=>go('thread/'+el.dataset.id));}
function renderThread(){const thread=state.threads.find(t=>String(t.id)===String(state.threadId));if(!thread){$('main').innerHTML='<a class="back" href="#threads">← back to threads</a><div class="error"><h2>thread not found</h2><p class="muted">This thread is not visible to the current user.</p></div>';return;}$('main').innerHTML='<a class="back" href="#threads">← back to threads</a><h1>'+esc(thread.title)+'</h1>'+(thread.summary?'<div class="thread-summary">'+md(thread.summary)+'</div>':'')+'<div class="divider">❦</div><div id="posts"></div><div id="composer"></div>';renderPosts();renderComposer();}
function renderPosts(){const list=$('posts');if(!state.posts.length){list.innerHTML='<p class="muted center">no posts yet — be the first to write</p>';return;}list.innerHTML=state.posts.map(p=>{const per=p.persona||{};const av=per.avatar_url?'background-image:url('+JSON.stringify(per.avatar_url)+')':'';return '<article class="post" style="'+(per.bg_color?'background:'+esc(per.bg_color)+';':'')+(per.text_color?'color:'+esc(per.text_color)+';':'')+(per.border_color?'border-color:'+esc(per.border_color)+';':'')+'"><div class="post-head"><div class="avatar" style="background-color:'+(esc(per.accent_color||'#a8854f'))+';'+av+'"></div><div class="post-name">'+esc(per.name||'unknown persona')+'</div><div class="post-meta">'+dateLabel(p.created_at)+'</div></div><div class="post-body">'+md(p.body)+'</div>'+(per.signature?'<div class="thread-summary">'+md(per.signature)+'</div>':'')+'</article>';}).join('');}
function renderComposer(){const wrap=$('composer');if(!state.mine.length){wrap.innerHTML='<div class="composer"><h3>reply disabled</h3><p class="muted">No persona is visible for this account yet. Create one on the personas page.</p></div>';return;}if(!state.mine.some(p=>p.id===state.selectedPersonaId))state.selectedPersonaId=state.mine[0].id;wrap.innerHTML='<div class="composer"><h3>reply</h3><div class="row"><label style="margin:0">as</label><select id="persona-select">'+state.mine.map(p=>'<option value="'+esc(p.id)+'" '+(p.id===state.selectedPersonaId?'selected':'')+'>'+esc(p.name)+'</option>').join('')+'</select></div><textarea id="body" class="mt" placeholder="markdown welcome"></textarea><div class="spread mt"><p class="muted">markdown renders in the post</p><button id="post-btn">post</button></div></div>';$('persona-select').onchange=e=>{state.selectedPersonaId=e.target.value;};$('post-btn').onclick=()=>safe(async()=>{const body=$('body').value.trim();if(!body)return toast('write something first','err');const btn=$('post-btn');btn.disabled=true;btn.textContent='posting…';await createPost(body);$('body').value='';btn.disabled=false;btn.textContent='post';renderPosts();toast('posted');},'create post');}
function defaultPersona(){return {id:null,name:'New Persona',avatar_url:'',banner_url:'',signature:'',bg_color:'#fbf6e9',text_color:'#2a221a',accent_color:'#a8854f',border_color:'#b9aa8a',font_family:"'EB Garamond', Georgia, serif",custom_css:''};}
function personaById(id){return state.mine.find(p=>String(p.id)===String(id));}
function renderPersonas(){if(!state.editPersonaId&&state.mine[0])state.editPersonaId=state.mine[0].id;let body='<div class="header"><h1>Personas</h1><button id="new-persona">＋ new persona</button></div><div class="persona-layout"><aside><h3>yours</h3><div class="persona-list">';if(!state.mine.length)body+='<p class="muted">none yet</p>';else body+=state.mine.map(p=>'<div class="persona-card '+(String(p.id)===String(state.editPersonaId)?'active':'')+'" data-id="'+esc(p.id)+'"><span class="dot" style="background:'+esc(p.accent_color||'#a8854f')+'"></span>'+esc(p.name)+'</div>').join('');body+='</div></aside><section id="persona-editor"></section></div>';$('main').innerHTML=body;$('new-persona').onclick=()=>{state.editPersonaId='new';renderPersonas();};document.querySelectorAll('.persona-card[data-id]').forEach(el=>el.onclick=()=>{state.editPersonaId=el.dataset.id;renderPersonas();});renderPersonaEditor();}
function renderPersonaEditor(){const area=$('persona-editor');if(!area)return;const isNew=state.editPersonaId==='new'||!state.editPersonaId;const p=isNew?defaultPersona():Object.assign(defaultPersona(),personaById(state.editPersonaId)||{});area.innerHTML='<div class="editor"><h2>'+(isNew?'New persona':'Edit persona')+'</h2><div class="editor-grid mt"><div class="field full"><label>name</label><input id="pe-name" value="'+esc(p.name||'')+'"></div><div class="field"><label>avatar url</label><input id="pe-avatar" value="'+esc(p.avatar_url||'')+'"></div><div class="field"><label>banner url</label><input id="pe-banner" value="'+esc(p.banner_url||'')+'"></div>'+colorField('bg','background',p.bg_color)+colorField('text','text',p.text_color)+colorField('accent','accent',p.accent_color)+colorField('border','border',p.border_color)+'<div class="field full"><label>font family</label><input id="pe-font" value="'+esc(p.font_family||'')+'"></div><div class="field full"><label>signature markdown</label><textarea id="pe-signature">'+esc(p.signature||'')+'</textarea></div><div class="field full"><label>custom css notes</label><textarea id="pe-css" placeholder="saved, but not executed yet while we keep the app stable">'+esc(p.custom_css||'')+'</textarea><p class="muted preview-note">Custom CSS is saved but not injected yet. We are not reopening the demon portal today.</p></div></div><div class="spread mt"><div class="row"><button id="save-persona">save persona</button><button class="ghost" id="reset-persona">reset</button></div>'+(isNew?'':'<button class="danger" id="delete-persona">delete persona</button>')+'</div><div class="mt2"><h3>preview</h3><div id="persona-preview"></div></div></div>';['name','avatar','banner','bg-c','bg-t','text-c','text-t','accent-c','accent-t','border-c','border-t','font','signature'].forEach(key=>{const el=$('pe-'+key);if(el)el.oninput=updatePersonaPreview;});[['bg','bg_color'],['text','text_color'],['accent','accent_color'],['border','border_color']].forEach(([k,prop])=>{const c=$('pe-'+k+'-c');const t=$('pe-'+k+'-t');c.oninput=()=>{t.value=c.value;updatePersonaPreview();};t.oninput=()=>{if(/^#[0-9a-fA-F]{6}$/.test(t.value)){c.value=t.value;}updatePersonaPreview();};});$('save-persona').onclick=()=>safe(async()=>{const payload=readPersonaForm();if(!payload.name.trim())return toast('name required','err');const btn=$('save-persona');btn.disabled=true;btn.textContent='saving…';const saved=await savePersona(payload,isNew?null:p.id);state.editPersonaId=saved.id;toast('persona saved');renderPersonas();},'save persona');$('reset-persona').onclick=()=>renderPersonaEditor();if(!isNew)$('delete-persona').onclick=()=>safe(async()=>{if(!confirm('Delete '+p.name+'?'))return;await deletePersona(p.id);state.editPersonaId=state.mine[0]?.id||'new';toast('persona deleted');renderPersonas();},'delete persona');updatePersonaPreview();}
function colorField(k,label,value){return '<div class="field"><label>'+label+'</label><div class="color-pair"><input id="pe-'+k+'-c" type="color" value="'+esc(value||'#000000')+'"><input id="pe-'+k+'-t" value="'+esc(value||'')+'"></div></div>';}
function readPersonaForm(){return {name:$('pe-name').value.trim(),avatar_url:$('pe-avatar').value.trim()||null,banner_url:$('pe-banner').value.trim()||null,signature:$('pe-signature').value.trim()||null,bg_color:$('pe-bg-t').value.trim()||'#fbf6e9',text_color:$('pe-text-t').value.trim()||'#2a221a',accent_color:$('pe-accent-t').value.trim()||'#a8854f',border_color:$('pe-border-t').value.trim()||'#b9aa8a',font_family:$('pe-font').value.trim()||null,custom_css:$('pe-css').value.trim()||null,updated_at:new Date().toISOString()};}
function updatePersonaPreview(){const box=$('persona-preview');if(!box)return;const p=readPersonaForm();const banner=p.banner_url?'<div class="banner" style="background-image:url('+JSON.stringify(p.banner_url)+')"></div>':'';const avatar=p.avatar_url?'background-image:url('+JSON.stringify(p.avatar_url)+')':'';box.innerHTML='<article class="post" style="background:'+esc(p.bg_color)+';color:'+esc(p.text_color)+';border-color:'+esc(p.border_color)+';font-family:'+esc(p.font_family||'inherit')+'">'+banner+'<div class="post-head"><div class="avatar" style="background-color:'+esc(p.accent_color)+';'+avatar+'"></div><div class="post-name">'+esc(p.name||'unnamed')+'</div><div class="post-meta">preview</div></div><div class="post-body"><p>This is how the persona speaks on the page.</p><blockquote>A line worth setting apart.</blockquote></div>'+(p.signature?'<div class="thread-summary">'+md(p.signature)+'</div>':'')+'</article>';}
function renderNewThreadModal(){const wrap=document.createElement('div');wrap.className='modal-bg';wrap.innerHTML='<div class="modal"><button class="close" id="modal-close">×</button><h2>New thread</h2><div class="mt"><label>title</label><input id="thread-title" placeholder="give it a name"></div><div class="mt"><label>summary or opening note</label><textarea id="thread-summary" placeholder="optional; markdown welcome"></textarea></div><div class="spread mt"><button class="ghost" id="cancel-thread">cancel</button><button id="create-thread">create</button></div></div>';document.body.appendChild(wrap);const close=()=>{state.modal=null;wrap.remove();};$('modal-close').onclick=close;$('cancel-thread').onclick=close;wrap.onclick=e=>{if(e.target===wrap)close();};setTimeout(()=>$('thread-title')?.focus(),0);$('create-thread').onclick=()=>safe(async()=>{const title=$('thread-title').value.trim();const summary=$('thread-summary').value.trim();if(!title)return toast('title required','err');const btn=$('create-thread');btn.disabled=true;btn.textContent='creating…';const thread=await createThread(title,summary);close();state.posts=[];go('thread/'+thread.id);toast('thread created');},'create thread');}
boot();
</script>
</body>
</html>
