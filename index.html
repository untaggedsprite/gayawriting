<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>GAYA</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&family=Literata:ital,wght@0,400;0,600;1,400&family=Sorts+Mill+Goudy:ital@0;1&display=swap" rel="stylesheet">
<link href="styles.css" rel="stylesheet">
</head>
<body><canvas id="pageBlooms" class="page-blooms" aria-hidden="true"></canvas><div id="app"><div class="main"><p class="muted">loading GAYA…</p></div></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL='https://yunwwocryohmvnfwbjig.supabase.co';
const SUPABASE_KEY='sb_publishable_XmVMsFZWZ_ZkMQVQyRnAmQ_FqllXED3';
const app=document.getElementById('app');
const state={session:null,user:null,view:'threads',threadId:null,threads:[],posts:[],personas:[],mine:[],selectedPersonaId:null,editPersonaId:null,modal:null,fatal:null};
const esc=v=>String(v??'').replace(/[&<>"']/g,ch=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));
const $=id=>document.getElementById(id);let supa=null;
function md(v){let s=esc(v||'');s=s.replace(/^### (.*)$/gm,'<h3>$1</h3>').replace(/^## (.*)$/gm,'<h2>$1</h2>').replace(/^# (.*)$/gm,'<h1>$1</h1>').replace(/^&gt; (.*)$/gm,'<blockquote>$1</blockquote>').replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>').replace(/\*([^*]+)\*/g,'<em>$1</em>').replace(/\n{2,}/g,'</p><p>').replace(/\n/g,'<br>');return '<p>'+s+'</p>';}
function styleSafe(v){return String(v||'').replace(/[;{}<>]/g,'').trim();}
function cssFontFamily(v){let raw=styleSafe(v||'');if(!raw)return 'inherit';return raw.split(',').map(part=>{let p=part.trim();if(!p)return '';if(/^var\(/.test(p)||/^['"].*['"]$/.test(p))return p;if(/\s/.test(p))return '"'+p.replace(/["\\]/g,'')+'"';return p;}).filter(Boolean).join(', ');}
function fontStyle(v){return 'font-family:'+cssFontFamily(v)+';';}
function dateLabel(iso){const d=new Date(iso||'');return Number.isNaN(d.getTime())?'undated':d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});}
function toast(m,k='ok'){const el=document.createElement('div');el.className='toast'+(k==='err'?' err':'');el.textContent=m;document.body.appendChild(el);setTimeout(()=>el.remove(),3200);}
function fail(e,w='runtime'){console.error(w,e);state.fatal={where:w,message:e&&e.message?e.message:String(e),stack:e&&e.stack?e.stack:''};renderFatal();}
async function safe(fn,w){try{return await fn();}catch(e){fail(e,w);return null;}}
function withTimeout(promise,label,ms=12000){return Promise.race([promise,new Promise((_,reject)=>setTimeout(()=>reject(new Error(label+' timed out after '+Math.round(ms/1000)+'s')),ms))]);}
function setStatus(kind,msg){const el=$('persona-status');if(!el)return;el.className=kind==='err'?'inline-error':'inline-ok';el.textContent=msg||'';}
function initPageBlooms(){const canvas=document.getElementById('pageBlooms');if(!canvas)return;const ctx=canvas.getContext('2d');const palettes=[['#E24B4A','#EF9F27','#F0997B','#FAC775','#D4537E'],['#F4C0D1','#FAC775','#9FE1CB','#B5D4F4','#CECBF6'],['#7F77DD','#534AB7','#D85A30','#EF9F27','#993556'],['#9FE1CB','#5DCAA5','#C0DD97','#FAC775','#F4C0D1']];let blooms=[],W=0,H=0,dpr=1;function makeFlower(x,y,edge){const palette=palettes[Math.floor(Math.random()*palettes.length)];const colorIdx=Math.floor(Math.random()*palette.length);return{x,y,petalCount:5+Math.floor(Math.random()*6),petalSize:(edge?6:4)+Math.random()*(edge?9:6),color:palette[colorIdx],centerColor:palette[(colorIdx+2)%palette.length],rotation:Math.random()*Math.PI*2,alpha:edge?.55+Math.random()*.18:.22+Math.random()*.2};}function scatter(){const count=Math.min(150,Math.max(70,Math.floor(W*H/15000)));blooms=[];for(let i=0;i<count;i++){const edge=Math.random()<.66;let x,y;if(edge){const side=Math.floor(Math.random()*4);if(side===0){x=Math.random()*W;y=16+Math.random()*120;}else if(side===1){x=W-16-Math.random()*150;y=Math.random()*H;}else if(side===2){x=Math.random()*W;y=H-16-Math.random()*150;}else{x=16+Math.random()*150;y=Math.random()*H;}}else{x=Math.random()*W;y=Math.random()*H;}blooms.push(makeFlower(x,y,edge));}}function draw(){ctx.clearRect(0,0,W,H);for(const f of blooms){ctx.save();ctx.globalAlpha=f.alpha;ctx.fillStyle=f.color;for(let i=0;i<f.petalCount;i++){const angle=f.rotation+(i/f.petalCount)*Math.PI*2;const px=f.x+Math.cos(angle)*f.petalSize*.9;const py=f.y+Math.sin(angle)*f.petalSize*.9;ctx.beginPath();ctx.arc(px,py,f.petalSize,0,Math.PI*2);ctx.fill();}ctx.fillStyle=f.centerColor;ctx.beginPath();ctx.arc(f.x,f.y,f.petalSize*.55,0,Math.PI*2);ctx.fill();ctx.restore();}}function resize(){dpr=window.devicePixelRatio||1;W=window.innerWidth;H=window.innerHeight;canvas.width=Math.floor(W*dpr);canvas.height=Math.floor(H*dpr);canvas.style.width=W+'px';canvas.style.height=H+'px';ctx.setTransform(dpr,0,0,dpr,0,0);scatter();draw();}window.addEventListener('resize',resize);resize();}
window.addEventListener('error',e=>fail(e.error||e.message,'runtime error'));window.addEventListener('unhandledrejection',e=>fail(e.reason,'unhandled promise'));
function readRoute(){const h=(location.hash||'#threads').slice(1);if(h.startsWith('thread/')){state.view='thread';state.threadId=h.slice(7);}else if(h==='personas'){state.view='personas';state.threadId=null;}else{state.view='threads';state.threadId=null;}}
function go(hash){if(location.hash==='#'+hash){readRoute();return refreshRoute();}location.hash=hash;}
window.addEventListener('hashchange',()=>safe(refreshRoute,'hash navigation'));
async function refreshRoute(){readRoute();if(state.session&&state.view==='thread'&&state.threadId)await loadPosts(state.threadId);render();}
async function boot(){await safe(async()=>{if(!window.supabase||!window.supabase.createClient)throw new Error('Supabase browser library did not load. CDN may be blocked.');supa=window.supabase.createClient(SUPABASE_URL,SUPABASE_KEY);readRoute();await checkSession();supa.auth.onAuthStateChange((_event,session)=>safe(async()=>{state.session=session;state.user=session&&session.user?session.user:null;if(session)await loadAll();render();},'auth change'));if(state.session){await loadAll();if(state.view==='thread'&&state.threadId)await loadPosts(state.threadId);}render();},'boot');}
async function checkSession(){const {data,error}=await supa.auth.getSession();if(error)throw error;state.session=data.session;state.user=data.session&&data.session.user?data.session.user:null;}
async function loadThreads(){const {data,error}=await supa.from('threads').select('*').order('updated_at',{ascending:false});if(error)throw error;state.threads=data||[];}
async function loadPersonas(){const {data,error}=await supa.from('personas').select('*').order('created_at',{ascending:true});if(error)throw error;state.personas=data||[];state.mine=state.personas.filter(p=>p.user_id===state.user?.id);}
async function loadPosts(id){const {data,error}=await supa.from('posts').select('*, persona:personas(*)').eq('thread_id',id).order('created_at',{ascending:true});if(error)throw error;state.posts=data||[];}
async function loadAll(){await Promise.all([loadThreads(),loadPersonas()]);}
async function magicLink(email){const redirectTo=window.location.origin+window.location.pathname;return await supa.auth.signInWithOtp({email,options:{emailRedirectTo:redirectTo,shouldCreateUser:false}});}
async function signOut(){await supa.auth.signOut();Object.assign(state,{session:null,user:null,threads:[],posts:[],personas:[],mine:[],view:'threads',threadId:null});render();}
async function createThread(title,summary){const {data,error}=await supa.from('threads').insert({title,summary:summary||null,created_by:state.user.id}).select('*').single();if(error)throw error;await loadThreads();return data;}
async function createPost(body){const personaId=state.selectedPersonaId||state.mine[0]?.id;if(!personaId)throw new Error('No persona is visible for this account yet. Create one on the personas page first.');const {data,error}=await supa.from('posts').insert({thread_id:state.threadId,persona_id:personaId,author_id:state.user.id,body}).select('*, persona:personas(*)').single();if(error)throw error;state.posts.push(data);await supa.from('threads').update({updated_at:new Date().toISOString()}).eq('id',state.threadId);return data;}
async function savePersona(payload,id){let res;if(id){res=await withTimeout(supa.from('personas').update(payload).eq('id',id).select('*').single(),'persona update');}else{payload.user_id=state.user.id;res=await withTimeout(supa.from('personas').insert(payload).select('*').single(),'persona insert');}if(res.error)throw res.error;await withTimeout(loadPersonas(),'reload personas');return res.data;}
async function deletePersona(id){const {error}=await supa.from('personas').delete().eq('id',id);if(error)throw error;await loadPersonas();}
function render(){if(state.fatal)return renderFatal();if(!state.session)return renderLogin();renderShell();}
function renderFatal(){app.innerHTML='<div class="main"><div class="error"><h1>GAYA tripped on a root.</h1><p class="muted">The app caught the error instead of staying blank.</p><pre>'+esc(state.fatal?.where)+'\n'+esc(state.fatal?.message)+'\n'+esc(state.fatal?.stack)+'</pre><button id="retry">try again</button></div></div>';$('retry').onclick=()=>{state.fatal=null;boot();};}
function renderLogin(){app.innerHTML='<div class="login"><div class="card"><div class="brand"><span class="leaf">❦</span> GAYA <span class="leaf">❦</span></div><p class="muted">a little garden, for the two of us</p><form id="login-form"><label for="email">email</label><input id="email" type="email" required autocomplete="email" placeholder="you@somewhere.com"><button class="mt" type="submit">send the link</button><div class="msg" id="login-msg"></div></form></div></div>';$('login-form').onsubmit=e=>safe(async()=>{e.preventDefault();const msg=$('login-msg');msg.className='msg';msg.textContent='sending…';const {error}=await magicLink($('email').value.trim());if(error){msg.className='msg err';msg.textContent=error.message||'something went wrong.';}else msg.textContent='check your inbox. the link will sign you in.';},'send magic link');}
function renderShell(){const ta=state.view==='thread'||state.view==='threads'?'active':'';const pa=state.view==='personas'?'active':'';app.innerHTML='<div class="app"><div class="top"><div class="brand" id="brand"><span class="leaf">❦</span> GAYA</div><nav class="tabs"><a class="'+ta+'" href="#threads">threads</a><a class="'+pa+'" href="#personas">personas</a></nav><div class="user"><span>'+esc(state.user?.email||'')+'</span><button class="ghost" id="signout">sign out</button></div></div><main class="main" id="main"></main></div>';$('brand').onclick=()=>go('threads');$('signout').onclick=()=>safe(signOut,'sign out');if(state.view==='thread')renderThread();else if(state.view==='personas')renderPersonas();else renderThreads();if(state.modal==='new-thread')renderNewThreadModal();}
function renderThreads(){let body='<div class="header"><div><p class="kicker">the little green house</p><h1>Threads</h1></div><button id="new-thread">＋ new thread</button></div>';if(!state.threads.length)body+='<div class="empty"><div><h2>nothing planted yet</h2><p class="muted">start the first thread above</p></div></div>';else body+='<div class="thread-list">'+state.threads.map(t=>'<a class="thread" href="#thread/'+esc(t.id)+'" data-id="'+esc(t.id)+'"><h3>'+esc(t.title)+'</h3>'+(t.summary?'<div class="summary">'+esc(t.summary).slice(0,240)+'</div>':'')+'<div class="meta">last activity · '+dateLabel(t.updated_at||t.created_at)+'</div></a>').join('')+'</div>';$('main').innerHTML=body;$('new-thread').onclick=()=>{state.modal='new-thread';render();};document.querySelectorAll('.thread').forEach(el=>el.onclick=()=>{if(el.dataset.id)go('thread/'+el.dataset.id);});}
function renderThread(){const thread=state.threads.find(t=>String(t.id)===String(state.threadId));if(!thread){$('main').innerHTML='<a class="back" href="#threads">← back to threads</a><div class="error"><h2>thread not found</h2><p class="muted">This thread is not visible to the current user.</p></div>';return;}$('main').innerHTML='<a class="back" href="#threads">← back to threads</a><div class="header"><div><p class="kicker">thread</p><h1>'+esc(thread.title)+'</h1></div></div>'+(thread.summary?'<div class="thread-summary">'+md(thread.summary)+'</div>':'')+'<div class="divider">❦</div><div id="posts"></div><div id="composer"></div>';renderPosts();renderComposer();}
function renderPosts(){const list=$('posts');if(!state.posts.length){list.innerHTML='<div class="empty"><div><h2>no posts yet</h2><p class="muted">be the first little goblin to write</p></div></div>';return;}list.innerHTML=state.posts.map(p=>{const per=p.persona||{};const f=fontStyle(per.font_family);const av=per.avatar_url?'background-image:url('+JSON.stringify(per.avatar_url)+')':'';const banner=per.banner_url?'<div class="banner" style="background-image:url('+JSON.stringify(per.banner_url)+')"></div>':'';return '<article class="post" style="'+(per.bg_color?'background:'+esc(per.bg_color)+';':'')+(per.text_color?'color:'+esc(per.text_color)+';':'')+(per.border_color?'border-color:'+esc(per.border_color)+';':'')+f+'">'+banner+'<div class="post-head"><div class="avatar" style="background-color:'+esc(per.accent_color||'#a8854f')+';'+av+'"></div><div class="post-name" style="'+f+'">'+esc(per.name||'unknown persona')+'</div><div class="post-meta">'+dateLabel(p.created_at)+'</div></div><div class="post-body" style="'+f+'">'+md(p.body)+'</div>'+(per.signature?'<div class="signature-block" style="'+f+'">'+md(per.signature)+'</div>':'')+'</article>';}).join('');}
function renderComposer(){const wrap=$('composer');if(!state.mine.length){wrap.innerHTML='<div class="composer"><h3>reply disabled</h3><p class="muted">No persona is visible for this account yet. Create one on the personas page.</p></div>';return;}if(!state.mine.some(p=>p.id===state.selectedPersonaId))state.selectedPersonaId=state.mine[0].id;wrap.innerHTML='<div class="composer"><h3>reply</h3><div class="row"><label style="margin:0">as</label><select id="persona-select">'+state.mine.map(p=>'<option value="'+esc(p.id)+'" '+(p.id===state.selectedPersonaId?'selected':'')+'>'+esc(p.name)+'</option>').join('')+'</select></div><textarea id="body" class="mt" placeholder="markdown welcome"></textarea><div class="spread mt"><p class="muted">markdown renders in the post</p><button id="post-btn">post</button></div></div>';$('persona-select').onchange=e=>{state.selectedPersonaId=e.target.value;};$('post-btn').onclick=()=>safe(async()=>{const body=$('body').value.trim();if(!body)return toast('write something first','err');const btn=$('post-btn');btn.disabled=true;btn.textContent='posting…';await createPost(body);$('body').value='';btn.disabled=false;btn.textContent='post';renderPosts();toast('posted');},'create post');}
function defaultPersona(){return {id:null,name:'New Persona',avatar_url:'',banner_url:'',signature:'',bg_color:'#fff9ed',text_color:'#2b241c',accent_color:'#a9854d',border_color:'#cdbf9f',font_family:"Sorts Mill Goudy, Georgia, serif",custom_css:''};}
function personaById(id){return state.mine.find(p=>String(p.id)===String(id));}
function renderPersonas(){if(!state.editPersonaId&&state.mine[0])state.editPersonaId=state.mine[0].id;let body='<div class="header"><div><p class="kicker">costume department</p><h1>Personas</h1></div><button id="new-persona">＋ new persona</button></div><div class="persona-layout"><aside><h3>yours</h3><div class="persona-list">';if(!state.mine.length)body+='<p class="muted">none yet</p>';else body+=state.mine.map(p=>'<div class="persona-card '+(String(p.id)===String(state.editPersonaId)?'active':'')+'" data-id="'+esc(p.id)+'"><span class="dot" style="background:'+esc(p.accent_color||'#a9854d')+'"></span>'+esc(p.name)+'</div>').join('');body+='</div></aside><section id="persona-editor"></section></div>';$('main').innerHTML=body;$('new-persona').onclick=()=>{state.editPersonaId='new';renderPersonas();};document.querySelectorAll('.persona-card[data-id]').forEach(el=>el.onclick=()=>{state.editPersonaId=el.dataset.id;renderPersonas();});renderPersonaEditor();}
function renderPersonaEditor(){const area=$('persona-editor');if(!area)return;const isNew=state.editPersonaId==='new'||!state.editPersonaId;const p=isNew?defaultPersona():Object.assign(defaultPersona(),personaById(state.editPersonaId)||{});area.innerHTML='<div class="editor"><h2>'+(isNew?'New persona':'Edit persona')+'</h2><div class="editor-grid mt"><div class="field full"><label>name</label><input id="pe-name" value="'+esc(p.name||'')+'"></div><div class="field"><label>avatar url</label><input id="pe-avatar" value="'+esc(p.avatar_url||'')+'"></div><div class="field"><label>banner url</label><input id="pe-banner" value="'+esc(p.banner_url||'')+'"></div>'+colorField('bg','background',p.bg_color)+colorField('text','text',p.text_color)+colorField('accent','accent',p.accent_color)+colorField('border','border',p.border_color)+'<div class="field full"><label>font family</label><input id="pe-font" list="font-options" value="'+esc(p.font_family||'')+'"><datalist id="font-options"><option value="Sorts Mill Goudy, Georgia, serif"><option value="IM Fell English, Sorts Mill Goudy, Georgia, serif"><option value="Literata, Georgia, serif"><option value="Fixedsys, Fixedsys Excelsior, Lucida Console, Courier New, monospace"><option value="Georgia, serif"><option value="Times New Roman, serif"><option value="Arial, sans-serif"><option value="Courier New, monospace"></datalist><p class="muted preview-note">Multi-word fonts are auto-quoted when rendered.</p></div><div class="field full"><label>signature markdown</label><textarea id="pe-signature">'+esc(p.signature||'')+'</textarea></div><div class="field full"><label>custom css notes</label><textarea id="pe-css" placeholder="saved, but not executed yet while we keep the app stable">'+esc(p.custom_css||'')+'</textarea><p class="muted preview-note">Custom CSS is saved but not injected yet. Pretty first, demon portal later.</p></div></div><div class="spread mt"><div class="row"><button id="save-persona">save persona</button><button class="ghost" id="reset-persona">reset</button></div>'+(isNew?'':'<button class="danger" id="delete-persona">delete persona</button>')+'</div><div id="persona-status"></div><div class="mt2"><h3>preview</h3><div id="persona-preview"></div></div></div>';['name','avatar','banner','bg-c','bg-t','text-c','text-t','accent-c','accent-t','border-c','border-t','font','signature'].forEach(key=>{const el=$('pe-'+key);if(el)el.oninput=updatePersonaPreview;});[['bg','bg_color'],['text','text_color'],['accent','accent_color'],['border','border_color']].forEach(([k])=>{const c=$('pe-'+k+'-c');const t=$('pe-'+k+'-t');c.oninput=()=>{t.value=c.value;updatePersonaPreview();};t.oninput=()=>{if(/^#[0-9a-fA-F]{6}$/.test(t.value)){c.value=t.value;}updatePersonaPreview();};});$('save-persona').onclick=async()=>{const payload=readPersonaForm();if(!payload.name.trim())return toast('name required','err');const btn=$('save-persona');try{btn.disabled=true;btn.textContent='saving…';setStatus('ok','saving…');const saved=await savePersona(payload,isNew?null:p.id);state.editPersonaId=saved.id;toast('persona saved');renderPersonas();}catch(e){console.error('persona save failed',e);setStatus('err','Save failed: '+(e.message||String(e))+(e.details?'\n'+e.details:'')+(e.hint?'\nHint: '+e.hint:''));toast('persona save failed','err');}finally{const again=$('save-persona');if(again){again.disabled=false;again.textContent='save persona';}}};$('reset-persona').onclick=()=>renderPersonaEditor();if(!isNew)$('delete-persona').onclick=()=>safe(async()=>{if(!confirm('Delete '+p.name+'?'))return;await deletePersona(p.id);state.editPersonaId=state.mine[0]?.id||'new';toast('persona deleted');renderPersonas();},'delete persona');updatePersonaPreview();}
function colorField(k,label,value){return '<div class="field"><label>'+label+'</label><div class="color-pair"><input id="pe-'+k+'-c" type="color" value="'+esc(value||'#000000')+'"><input id="pe-'+k+'-t" value="'+esc(value||'')+'"></div></div>';}
function readPersonaForm(){return {name:$('pe-name').value.trim(),avatar_url:$('pe-avatar').value.trim()||null,banner_url:$('pe-banner').value.trim()||null,signature:$('pe-signature').value.trim()||null,bg_color:$('pe-bg-t').value.trim()||'#fff9ed',text_color:$('pe-text-t').value.trim()||'#2b241c',accent_color:$('pe-accent-t').value.trim()||'#a9854d',border_color:$('pe-border-t').value.trim()||'#cdbf9f',font_family:$('pe-font').value.trim()||null,custom_css:$('pe-css').value.trim()||null,updated_at:new Date().toISOString()};}
function updatePersonaPreview(){const box=$('persona-preview');if(!box)return;const p=readPersonaForm();const f=fontStyle(p.font_family);const banner=p.banner_url?'<div class="banner" style="background-image:url('+JSON.stringify(p.banner_url)+')"></div>':'';const avatar=p.avatar_url?'background-image:url('+JSON.stringify(p.avatar_url)+')':'';box.innerHTML='<article class="post" style="background:'+esc(p.bg_color)+';color:'+esc(p.text_color)+';border-color:'+esc(p.border_color)+';'+f+'">'+banner+'<div class="post-head"><div class="avatar" style="background-color:'+esc(p.accent_color)+';'+avatar+'"></div><div class="post-name" style="'+f+'">'+esc(p.name||'unnamed')+'</div><div class="post-meta">preview</div></div><div class="post-body" style="'+f+'"><p>This is how the persona speaks on the page.</p><blockquote>A line worth setting apart.</blockquote></div>'+(p.signature?'<div class="signature-block" style="'+f+'">'+md(p.signature)+'</div>':'')+'</article>';}
function renderNewThreadModal(){const wrap=document.createElement('div');wrap.className='modal-bg';wrap.innerHTML='<div class="modal"><button class="close" id="modal-close">×</button><h2>New thread</h2><div class="mt"><label>title</label><input id="thread-title" placeholder="give it a name"></div><div class="mt"><label>summary or opening note</label><textarea id="thread-summary" placeholder="optional; markdown welcome"></textarea></div><div class="spread mt"><button class="ghost" id="cancel-thread">cancel</button><button id="create-thread">create</button></div></div>';document.body.appendChild(wrap);const close=()=>{state.modal=null;wrap.remove();};$('modal-close').onclick=close;$('cancel-thread').onclick=close;wrap.onclick=e=>{if(e.target===wrap)close();};setTimeout(()=>$('thread-title')?.focus(),0);$('create-thread').onclick=()=>safe(async()=>{const title=$('thread-title').value.trim();const summary=$('thread-summary').value.trim();if(!title)return toast('title required','err');const btn=$('create-thread');btn.disabled=true;btn.textContent='creating…';const thread=await createThread(title,summary);close();state.posts=[];go('thread/'+thread.id);toast('thread created');},'create thread');}
initPageBlooms();
boot();
</script>
</body>
</html>
